 decision_convert_to_feudal_admin: "Formalize Administration"
 decision_convert_to_feudal_admin_desc: "Glory and oaths have gradually given way to intricate court politics. Scattered farms with chaotic taxation are being replaced by vast landed estates. Hiding in a stone castles is no longer enough for adapting to the growing complexity of the realm.\n\nTo maintain my rule, relying on armies alone is no longer sufficient. I must intervene more in the administration of the realm, through laws and institutions."
 decision_convert_to_feudal_admin_tooltip: "Formally implement and clarify administrative practices within the realm through laws and institutions"
 decision_convert_to_feudal_admin_confirm: "Formalize Laws and Institutions"

 decision_build_domicile: "Build an Estate"
 decision_build_domicile_desc: "A beautiful and comfortable [estate|E] is not only the glory of the [house], but also the economic center of the [realm|E].\nEven if one day we are unfortunate enough to be removed from the political affairs of the [realm|E], the harvests of the land and the rents of the tenants will ensure the prosperity of the [house] for generations."
 decision_build_domicile_tooltip: "Build a beautiful and comfortable [domicile|E] in the fertile lands of the [realm|E]"
 decision_build_domicile_confirm: "Start Building an Estate"
 tt_capital_county_has_high_control: "[capital|E] [county]'s [control|E] is higher than 75"

 decision_declare_autonomy_title: "Declare Autonomy"
 decision_declare_autonomy_desc: "The authority of the [liege|E] is waning. They may no longer be able to protect our interests, and the realm stands on the brink of fragmentation. It is time to plan for the future of our house and the [realm|E].\n\nAmid the chaos, I can seize greater power, and demanding the abolition of certain harsh [vassal_contract|E] obligations seems like a good place to begin."
 decision_declare_autonomy_tooltip: "Abolish certain harsh [vassal_contract|E] obligations to gain greater power"
 decision_declare_autonomy_confirm: "Declare Autonomy"

