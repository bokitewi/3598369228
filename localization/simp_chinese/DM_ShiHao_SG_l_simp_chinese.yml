#谥号
  DM_Shihao.010_t: "议谥"
  DM_Shihao.010_d: "臣闻维周公旦、太公望，开嗣王业，建功于牧之野，终将葬，乃制谥。遂叙谥法。\n\n谥者，行之迹也。号者，功之表也。车服者，位之章也。\n\n是以大行受大名，细行受细名，行出于己，名生于人。"
