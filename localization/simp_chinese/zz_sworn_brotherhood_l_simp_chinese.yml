 # Opinion Modifiers & Tooltips
 opinion_broken_oath_justice:0 "背叛神圣盟约"
 opinion_expected_betrayal:0 "早料其奸"
 stress_broken_oath_tt:0 "结拜兄弟的背叛动摇了你的心魄。"
 stress_vengeful_rage_tt:0 "正义的怒火吞噬着你，却无法带来平静。"
 
 # Enhanced Follow-up Event Options
 sworn_brotherhood_loyalty_strengthened_tt:0 "我们的忠诚纽带历经考验，比以往任何时候都更加牢固。"
 sworn_brotherhood_ferocity_strengthened_tt:0 "我们炽烈的兄弟情谊在时间的熔炉中证明了其价值。"
 sworn_brotherhood_tested_tt:0 "我们的义结金兰经受住了时间的考验，并因此更加坚固。"
 sworn_brotherhood_humble_refusal_tt:0 "我们谦逊地承认，彼此的情谊无需更多的仪式或奖赏。"