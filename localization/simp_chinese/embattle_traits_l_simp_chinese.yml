l_simp_chinese:
# ACOTW Compatch
trait_acotw_obscured:0 "隐没者"
trait_acotw_obscured_desc:0 "该角色位于[diplomatic_range|E]之外，使其生平细节难以核实。"
trait_acotw_obscured_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip]位于[diplomatic_range|E]之外，使得[ROOT.GetCharacter.GetHerHis]的事迹细节难以核实。"

#Commander Traits
trait_embattle_logistician: "后勤专家"
trait_embattle_logistician_1: "熟练的后勤官"
trait_embattle_logistician_2: "军需总管"
trait_embattle_logistician_3: "后勤大师"
trait_embattle_logistician_desc: "如果有一件后勤专家知道的事情，那一定是如何让补给坚持得更久——越久越好。"
trait_embattle_logistician_character_desc: "如果有一件[ROOT.GetCharacter.GetFirstNameNoTooltip]知道的事情，那一定是如何让补给坚持得更久——越久越好。"
trait_track_embattle_logistician: "后勤师"
trait_track_embattle_logistician_desc: "#help 你可以通过率领军队在地图上移动来获得该路线上的经验。#!\n\n掌握了补给就是主导了战争，军队在最关键的时刻绝不会动摇。"

trait_embattle_military_engineer: "军事工程师"
trait_embattle_military_engineer_1: "熟练的器械师"
trait_embattle_military_engineer_2: "破城大师"
trait_embattle_military_engineer_3: "摧城如林者"
trait_embattle_military_engineer_desc: "拥有关于攻城器械与防御设施的广泛知识，军事工程师不会被城墙阻挡。"
trait_embattle_military_engineer_character_desc: "拥有关于攻城器械与防御设施的广泛知识，[ROOT.GetCharacter.GetFirstNameNoTooltip]不会被城墙阻挡。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_military_engineer: "围城者"
trait_track_embattle_military_engineer_desc: "#help 你可以通过成功完成围攻来获得该路线上的经验。#!\n\n在战争中，一道道壁垒是挡在军队面前必须克服的挑战。"

trait_embattle_aggressive_attacker: "激进的进攻者"
trait_embattle_aggressive_attacker_1: "大胆的前卫"
trait_embattle_aggressive_attacker_2: "无畏的先锋"
trait_embattle_aggressive_attacker_3: "闻名的陷阵者"
trait_embattle_aggressive_attacker_desc: "除了敌人的鲜血，没有什么可以满足激进的进攻者。"
trait_embattle_aggressive_attacker_character_desc: "没有什么可以满足[ROOT.GetCharacter.GetFirstNameNoTooltip]，除了[ROOT.GetCharacter.GetHerHis]敌人的鲜血。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_aggressive_attacker: "进攻专家"
trait_track_embattle_aggressive_attacker_desc: "#help 你可以通过主动进攻来获得该路线上的经验。#!\n\n迅猛的进攻就是最好的防御。"

trait_embattle_unyielding_defender: "防御者"
trait_embattle_unyielding_defender_1: "坚定的守卫者"
trait_embattle_unyielding_defender_2: "不屈的防御者"
trait_embattle_unyielding_defender_3: "不灭的哨兵"
trait_embattle_unyielding_defender_desc: "防御者所知的金科玉律：敌人只能到此为止。"
trait_embattle_unyielding_defender_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]所知的金科玉律：敌人只能到此为止。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_unyielding_defender: "防守专家"
trait_track_embattle_unyielding_defender_desc: "#help 你可以通过在战斗中防御来获得该路线上的经验。#!\n\n堡垒是否坚固取决于守卫者的意志。"

trait_embattle_forder: "涉水者"
trait_embattle_forder_1: "过河卒"
trait_embattle_forder_2: "涉津者"
trait_embattle_forder_3: "破浪者"
trait_embattle_forder_desc: "该角色靠近水时就像在自己家里，且不会在战争中因为过河、过海峡而受到优势惩罚。"
trait_embattle_forder_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]靠近水时就像在自己家里，且不会在战争中因为过河、过海峡而受到优势惩罚。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_forder: "河流专家"
trait_track_embattle_forder_desc: "#help 你可以通过在海岸或河流两岸的省份战斗来获得该路线上的经验。#!\n\n别人看到的是湍急的河流和溪谷，而他们眼中是通往胜利的通途。"

trait_embattle_flexible_leader: "灵活的将领"
trait_embattle_flexible_leader_1: "随机应变者"
trait_embattle_flexible_leader_2: "战场多面手"
trait_embattle_flexible_leader_3: "机动作战大师"
trait_embattle_flexible_leader_desc: "该角色知道如何减少防御方的军队从防御工事、地形、河川、海峡获得的优势。"
trait_embattle_flexible_leader_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]知道如何减少防御方的军队从防御工事、地形、河川、海峡获得的优势。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_flexible_leader: "机变者"
trait_track_embattle_flexible_leader_desc: "#help 你可以通过与军队战斗来获得该路线上的经验。#!\n\n在任何战场上，适应都是生存的关键。"

trait_embattle_desert_warrior: "沙漠战士"
trait_embattle_desert_warrior_1: "沙丘战士"
trait_embattle_desert_warrior_2: "沙海行者"
trait_embattle_desert_warrior_3: "流沙之灾"
trait_embattle_desert_warrior_desc: "沙漠中的烈日与酷热不是该角色的敌人。"
trait_embattle_desert_warrior_character_desc: "沙漠中的烈日与酷热不是[ROOT.GetCharacter.GetFirstNameNoTooltip]的敌人。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_desert_warrior: "沙漠作战专家"
trait_track_embattle_desert_warrior_desc: "#help 你可以通过在沙漠、沙漠山地、绿洲或干旱地区战斗来获得该路线上的经验。#!\n\n在广袤而严酷的沙漠，坚忍不拔的人胜过一切。"

trait_embattle_jungle_stalker: "丛林追猎者"
trait_embattle_jungle_stalker_1: "藤蔓之刃"
trait_embattle_jungle_stalker_2: "林冠猎手"
trait_embattle_jungle_stalker_3: "丛林之影"
trait_embattle_jungle_stalker_desc: "任何丛林中的繁茂树林都是该角色的盟友。"
trait_embattle_jungle_stalker_character_desc: "任何丛林中的繁茂树林都是[ROOT.GetCharacter.GetFirstNameNoTooltip]的盟友。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_jungle_stalker: "丛林作战专家"
trait_track_embattle_jungle_stalker_desc: "#help 你可以通过在丛林地形中战斗来获得该路线上的经验。#!\n\n遮天蔽日的丛林中埋伏着隐蔽的大师，随时准备从暗处发动攻击。"

trait_embattle_reaver: "劫掠者"
trait_embattle_reaver_1: "劫夺者"
trait_embattle_reaver_2: "抢掠者"
trait_embattle_reaver_3: "恐惧化身"
trait_embattle_reaver_desc: "劫掠者对战利品的渴望几乎和胜利一样：如果存在任何有价值的东西，劫掠者就会找到它。"
trait_embattle_reaver_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]对战利品的渴望几乎和胜利一样，如果存在任何有价值的东西，[ROOT.GetCharacter.GetSheHe]就会找到它。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_reaver: "劫掠者"
trait_track_embattle_reaver_desc: "#help 你可以通过成功劫掠定居点来获得该路线上的经验。#!\n\n掠夺者所到之处，一切都将被战火与征服深深地重塑。"

trait_embattle_reckless: "鲁莽"
trait_embattle_reckless_1: "冒险的将领"
trait_embattle_reckless_2: "战场赌徒"
trait_embattle_reckless_3: "狂野之心"
trait_embattle_reckless_desc: "如果鲁莽的将领发现了一个优势，那就一定会牢牢把握住它。"
trait_embattle_reckless_character_desc: "如果[ROOT.GetCharacter.GetFirstNameNoTooltip]发现了一个优势，那就一定会牢牢把握住它。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_reckless: "大胆的指挥官"
trait_track_embattle_reckless_desc: "#help 你可以通过与规模更庞大的军队作战来获得该路线上的经验。#!\n\n命运眷顾那些敢于为伟大事业甘冒一切风险的人。"

trait_embattle_holy_warrior: "虔信之剑"
trait_embattle_holy_warrior_1: "神明之刃"
trait_embattle_holy_warrior_2: "圣战士"
trait_embattle_holy_warrior_3: "信仰勇士"
trait_embattle_holy_warrior_desc: "正义的热情在熊熊燃烧，信仰之剑永不停息，直到所有异教徒尽数覆灭。"
trait_embattle_holy_warrior_character_desc: "正义的狂热在燃烧，[ROOT.GetCharacter.GetFirstNameNoTooltip]不会休息，直至异教徒全被击败。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_holy_warrior: "狂热者"
trait_track_embattle_holy_warrior_desc: "#help 你可以通过与其他信仰的敌人战斗来获得该路线上的经验。#!\n\n以信仰淬炼内心，没有不可战胜的敌人，没有令人退缩的战斗。"

trait_embattle_open_terrain_expert: "开阔地形专家"
trait_embattle_open_terrain_expert_1: "田野守望者"
trait_embattle_open_terrain_expert_2: "旷野战略家"
trait_embattle_open_terrain_expert_3: "平原之主"
trait_embattle_open_terrain_expert_desc: "到了开阔的场地和广阔的空间，该角色就像回家一样，并且会迅速在战斗中加以利用。"
trait_embattle_open_terrain_expert_character_desc: "到了开阔的场地和广阔的空间，[ROOT.GetCharacter.GetFirstNameNoTooltip]就像回家一样，并且会迅速在战斗中加以利用。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_open_terrain_expert: "开阔地形专家"
trait_track_embattle_open_terrain_expert_desc: "#help 你可以通过在平原、农田或草原地形上战斗来获得该路线上的经验。#!\n\n开阔的场地为我们提供了无限机动与制胜的机会。"

trait_embattle_rough_terrain_expert: "崎岖地形专家"
trait_embattle_rough_terrain_expert_1: "开路先驱"
trait_embattle_rough_terrain_expert_2: "高地战术家"
trait_embattle_rough_terrain_expert_3: "群峰之主"
trait_embattle_rough_terrain_expert_desc: "对于那些能够利用困难地形并在战斗中占上风的人来说，困难地形可以成为强大的工具。"
trait_embattle_rough_terrain_expert_character_desc: "对于那些能够利用困难地形并在战斗中占上风的人来说，困难地形可以成为强大的工具。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_rough_terrain_expert: "崎岖地形专家"
trait_track_embattle_rough_terrain_expert_desc: "#help 你可以通过在丘陵、山脉或湿地地形中战斗来获得该路线上的经验。#!\n\n在最艰苦的环境中，胜利属于那些迎难而上的人。"

trait_embattle_forest_fighter: "森林斗士"
trait_embattle_forest_fighter_1: "林间追猎者"
trait_embattle_forest_fighter_2: "森林守望者"
trait_embattle_forest_fighter_3: "森林之主"
trait_embattle_forest_fighter_desc: "有些人将森林视为障碍，该角色将森林视为机会。"
trait_embattle_forest_fighter_character_desc: "有些人将森林视为障碍，[ROOT.GetCharacter.GetFirstNameNoTooltip]将森林视为机会。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_forest_fighter: "森林作战专家"
trait_track_embattle_forest_fighter_desc: "#help 你可以通过在森林或针叶林地形中战斗来获得该路线上的经验。#!\n\n在林中，每一片树影都是一面盾牌，每一根树枝都是一位盟友。"

trait_embattle_cautious_leader: "谨慎的将领"
trait_embattle_cautious_leader_1: "耐心的策划家"
trait_embattle_cautious_leader_2: "警惕的指挥官"
trait_embattle_cautious_leader_3: "审慎的大师"
trait_embattle_cautious_leader_desc: "谨慎的将领会小心避免战斗中不必要的风险，但是也会因此损失潜在的收获。"
trait_embattle_cautious_leader_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]会小心避免战斗中不必要的风险，但是也会因此损失潜在的收获。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_cautious_leader: "谨慎的指挥官"
trait_track_embattle_cautious_leader_desc: "#help 你可以通过与规模更庞大的军队作战来获得该路线上的经验。#!\n\n耐心与严谨才能让每一步都在计划之内，把损失降到最低。"

trait_embattle_organizer: "组织者"
trait_embattle_organizer_1: "战术家"
trait_embattle_organizer_2: "急行军策划者"
trait_embattle_organizer_3: "运动战大师"
trait_embattle_organizer_desc: "在有能之人的手中，组织良好的军队在任何情况下都能迅速击败敌人。"
trait_embattle_organizer_character_desc: "在有能之人的手中，组织良好的军队在任何情况下都能迅速击败敌人。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_organizer: "行军者"
trait_track_embattle_organizer_desc: "#help 你可以通过率领军队在地图上移动来获得该路线上的经验。#!\n\n一支协调良好的部队行动迅速，从而精准地攻击他们的敌人。"

trait_embattle_winter_soldier: "冬将军"
trait_embattle_winter_soldier_1: "霜雪守望者"
trait_embattle_winter_soldier_2: "雪原老兵"
trait_embattle_winter_soldier_3: "严寒之主"
trait_embattle_winter_soldier_desc: "该角色受严冬铸炼，知道如何将其化为自己的优势。"
trait_embattle_winter_soldier_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]受严冬铸炼，知道如何将其化为[ROOT.GetCharacter.GetHerHis]的优势。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"
trait_track_embattle_winter_soldier: "冬季作战专家"
trait_track_embattle_winter_soldier_desc: "#help 你可以通过在受冬季影响的省份进行战斗来获得该路线上的经验。#!\n\n严寒不是敌人——对于那些坚忍不拔的人而言，严寒是他们的盟友。"

#Commander Traits (cultural traditions)
trait_embattle_sea_raider: "海袭者"
trait_embattle_sea_raider_desc: "海袭者不惧海中的惊涛骇浪，运用大胆且出众的航海能力，毫无预警地袭击未受保护的海岸。"
trait_embattle_sea_raider_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip]不惧海中的惊涛骇浪，运用大胆且出众的航海能力，毫无预警地袭击未受保护的海岸。\n\n#weak [embattle|E]：副将与[embattle_tactic|E]#!"

