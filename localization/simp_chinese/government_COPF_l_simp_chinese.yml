 feudal_admin_government_desc: "\n$game_concept_feudal_desc$\n\n#F 封建制是九世纪至十五世纪在欧洲占主导地位的政体。土地持有者与那些提供服务与劳动以换取居住权的人之间形成的关系，是封建系统的基石。随着技术和行政能力的发展，这种基于契约和人身依附关系的社会模式也开始发生变动。统治者们开始更多的利用法律和委派的官员彰显中央的权威。#!"

