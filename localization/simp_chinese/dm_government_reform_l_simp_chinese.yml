l_simp_chinese:
 dm_government_reform_law_group:0 "政体改革"
 dm_government_reform_law_group_singular:0 "政体改革"
 dm_government_reform_law_group_desc:0 "通过变法重塑国家的统治结构。政体改革固定耗费2000威望，成功后只改变君主本人的政体与必要的个人制度，不会批量改变封臣。"
 dm_government_reform_category_help:0 "可选择的目标按照政体类型排列。当前政体不会重复显示；跨类型改革须遵循既定演进路径。"
 dm_government_reform_category_primitive:0 "原始政体"
 dm_government_reform_category_feudal:0 "封建类政体"
 dm_government_reform_category_administrative:0 "行政类政体"
 dm_government_reform_category_special:0 "特殊类政体"
 dm_government_reform_category_locked:0 "#low 当前政体不能向此类政体改革#!"
 dm_government_reform_exception_help:0 "#warning 当前政体不属于常规改革体系；玩家只能通过完整变法流程改为封建行政制。#!"
 dm_government_reform_feudal_law:0 "封建制"
 dm_government_reform_feudal_law_desc:0 "将国家改造为以封臣契约、城堡领地与王权为基础的封建制。"
 dm_government_reform_republic_law:0 "共和制"
 dm_government_reform_republic_law_desc:0 "将国家改造为以城市和共和官职为基础的共和制。\n\n#X 警告：共和制可能使当前角色失去可玩性，并可能立即结束本局游戏。#!"
 dm_government_reform_theocracy_law:0 "神权制"
 dm_government_reform_theocracy_law_desc:0 "将国家改造为以宗教职位和教堂领地为基础的神权制。\n\n#X 警告：神权制可能使当前角色失去可玩性，并可能立即结束本局游戏。#!"
 dm_government_reform_clan_law:0 "氏族制"
 dm_government_reform_clan_law_desc:0 "将国家改造为以家族关系和氏族契约为基础的氏族制。"
 dm_government_reform_tribal_law:0 "部落制"
 dm_government_reform_tribal_law_desc:0 "将国家改造为依靠部落权威和部落地产的部落制。"
 dm_government_reform_wanua_law:0 "瓦努阿制"
 dm_government_reform_wanua_law_desc:0 "将国家改造为瓦努阿式的部落共同体。"
 dm_government_reform_administrative_law:0 "行政制"
 dm_government_reform_administrative_law_desc:0 "将国家改造为以总督、世族庄园、国库和帝国官僚制为基础的行政制。"
 dm_government_reform_feudal_admin_law:0 "封建行政制"
 dm_government_reform_feudal_admin_law_desc:0 "将封建契约与行政世族制度结合，建立封建行政制。"
 dm_government_reform_celestial_law:0 "天朝制"
 dm_government_reform_celestial_law_desc:0 "建立天朝官僚制、东亚庄园和国库体系。"
 dm_government_reform_mandala_law:0 "曼荼罗制"
 dm_government_reform_mandala_law_desc:0 "建立以寺庙城塞和曼荼罗诏令为核心的统治体制。"
 dm_government_reform_meritocratic_law:0 "贤能制"
 dm_government_reform_meritocratic_law_desc:0 "建立以贤能官僚制、世族和东亚庄园为基础的政体。"
 dm_government_reform_japan_administrative_law:0 "日本律令制"
 dm_government_reform_japan_administrative_law_desc:0 "建立日本律令官僚制和日本庄园。"
 dm_government_reform_japan_feudal_law:0 "日本封建制"
 dm_government_reform_japan_feudal_law_desc:0 "建立日本封建制，同时保留日本庄园和相应官僚法律。"
 dm_government_reform_nomad_law:0 "游牧制"
 dm_government_reform_nomad_law_desc:0 "将国家改造为依靠牙帐、牲畜和游牧权威的游牧制。"
 dm_government_reform_steppe_admin_law:0 "草原行政制"
 dm_government_reform_steppe_admin_law_desc:0 "建立兼具草原传统与贤能官僚制度的草原行政制。"
