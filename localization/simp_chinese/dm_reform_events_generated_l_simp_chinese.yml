 dm_reform.1101.t:0 "军令拒行"
 dm_reform.1101.desc:0 "[dm_reform_actor.GetShortUIName]（[dm_reform_actor.Custom('DMReformActorOffice')]）：反对者借此事发难，局势已逼近失控。你必须依靠自己或改革者的能力化解危机。"
