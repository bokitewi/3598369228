 decision_declare_autonomy_desc: "[liege|E]的权力式微，恐怕无法继续保护我们的利益。国家已在分裂的边缘，是时候开始为家族和[realm|E]的未来图谋打算了。\n\n我可以趁着混乱借机攫取更多的权力，要求废除一些严苛的[vassal_contract|E]义务似乎是一个好的开始。"
