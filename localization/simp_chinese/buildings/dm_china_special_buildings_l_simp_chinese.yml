l_simp_chinese:
 building_baijing_01:0 "白陉"
 building_baijing_01_desc:0 "白陉扼守山道，是当地防御与交通体系中的重要关隘。"
 building_dagu_01:0 "大谷关"
 building_dagu_01_desc:0 "大谷关控扼谷道，可阻绝敌军并保护往来商旅。"
 building_dasanguan_01:0 "大散关"
 building_dasanguan_01_desc:0 "大散关依山据险，是关中西南门户。"
 building_dasuisai_01:0 "大隧塞"
 building_dasuisai_01_desc:0 "大隧塞凭借险峻地势守护周边疆土。"
 building_dujiangyan_01:0 "都江堰"
 building_dujiangyan_01_desc:0 "都江堰分流引水、灌溉田亩，使成都平原得享沃野之利。"
 building_fengyue_01:0 "封岳关"
 building_fengyue_01_desc:0 "封岳关扼守山间要道，为周边领地提供坚实屏障。"
 building_guancheng_01:0 "关城"
 building_guancheng_01_desc:0 "坚固的关城驻有守军，控制着附近的道路与隘口。"
 building_type_guancheng_01_desc:0 "$building_guancheng_01_desc$"
 building_hanguguan_01:0 "函谷关"
 building_hanguguan_01_desc:0 "函谷关地势险固，是出入关中的战略门户。"
 building_hongzhisai_01:0 "鸿池塞"
 building_hongzhisai_01_desc:0 "鸿池塞守卫交通要冲，可迟滞来犯之敌。"
 building_huangjintai_01:0 "黄金台"
 building_huangjintai_01_desc:0 "黄金台象征礼贤下士，吸引天下英才前来效命。"
 building_hulaoguan_01:0 "虎牢关"
 building_hulaoguan_01_desc:0 "虎牢关山势险要，历来是中原兵家必争之地。"
 building_jianmenguan_01:0 "剑门关"
 building_jianmenguan_01_desc:0 "剑门关夹峙群山，是蜀地北方最险峻的门户之一。"
 building_jingjinguan_01:0 "井陉关"
 building_jingjinguan_01_desc:0 "井陉关据太行险道，控制东西往来的重要通路。"
 building_Jixiaxuegong_01:0 "稷下学宫"
 building_Jixiaxuegong_01_desc:0 "稷下学宫汇聚诸子学者，使百家之言得以争鸣。"
 building_juyongguan_01:0 "居庸关"
 building_juyongguan_01_desc:0 "居庸关凭山临谷，守卫北方通往腹地的要道。"
 building_lingqu_01:0 "灵渠"
 building_lingqu_01_desc:0 "灵渠沟通水系，便利漕运并灌溉沿岸田地。"
 building_loufan_01:0 "楼烦关"
 building_loufan_01_desc:0 "楼烦关守卫北部山口，是抵御草原来敌的重要据点。"
 building_mengjin_01:0 "孟津"
 building_mengjin_01_desc:0 "孟津是黄河上的重要渡口，便于军旅与商贸往来。"
 building_mineguan_01:0 "黾阨关"
 building_mineguan_01_desc:0 "黾阨关道路狭险，少量守军即可据险拒敌。"
 building_piantou_01:0 "偏头关"
 building_piantou_01_desc:0 "偏头关控制河谷与边道，是北境防线的重要组成。"
 building_tianjing_01:0 "天井关"
 building_tianjing_01_desc:0 "天井关高踞太行山道，易守难攻。"
 building_tongguan_01:0 "潼关"
 building_tongguan_01_desc:0 "潼关依山带河，扼守关中东部门户。"
 building_wuguan_01:0 "武关"
 building_wuguan_01_desc:0 "武关控制秦楚之间的南北通道，战略地位极为重要。"
 building_wushengguan_01:0 "武胜关"
 building_wushengguan_01_desc:0 "武胜关坐落于险隘之间，是南北交通的关键节点。"
 building_xiameng_01:0 "夏门关"
 building_xiameng_01_desc:0 "夏门关守护山谷入口，可有效阻挡敌军深入。"
 building_xiaoguan_01:0 "萧关"
 building_xiaoguan_01_desc:0 "萧关是西北边地的传统关塞，护卫通往关中的道路。"
 building_xiaopingjin_01:0 "小平津"
 building_xiaopingjin_01_desc:0 "小平津控制黄河渡口，为军队与物资往来提供便利。"
 building_xuanmen_01:0 "旋门关"
 building_xuanmen_01_desc:0 "旋门关据险设防，守护附近的交通要道。"
 building_xuanyuan_01:0 "轩辕关"
 building_xuanyuan_01_desc:0 "轩辕关依山而建，是连接中原与周边地区的重要关隘。"
 building_yangguan_01:0 "阳关"
 building_yangguan_01_desc:0 "阳关守望西域道路，为远行商旅与军队提供庇护。"
 building_yangping_01:0 "阳平关"
 building_yangping_01_desc:0 "阳平关控扼汉中门户，是进出蜀地的兵家要地。"
 building_yanmenguan_01:0 "雁门关"
 building_yanmenguan_01_desc:0 "雁门关雄踞北境山脉，长久守卫中原北部。"
 building_yaoguan_01:0 "崤关"
 building_yaoguan_01_desc:0 "崤关道路险峻，是关中与中原之间的战略通道。"
 building_yijue_01:0 "伊阙"
 building_yijue_01_desc:0 "伊阙两山对峙、河水贯流，是洛阳南面的天然门户。"
 building_yumen_01:0 "玉门关"
 building_yumen_01_desc:0 "玉门关守护通往西域的长路，是边贸与防御的枢纽。"
 building_zhanghuagong_01:0 "章华宫"
 building_zhanghuagong_01_desc:0 "章华宫殿宇壮丽，彰显统治者的威仪与国力。"
 building_zhugong_01:0 "渚宫"
 building_zhugong_01_desc:0 "渚宫坐落在郢都东南，既能监控汉水与长江航运，也可作为巡视南方的驻跸之所。"
 building_gusugong_01:0 "姑苏台"
 building_gusugong_01_desc:0 "姑苏台高耸壮丽，登台可远眺江南湖光山色，是吴地著名的宫苑高台。"
 building_zhennan_01:0 "镇南关"
 building_zhennan_01_desc:0 "镇南关扼守南方通道，为边境提供坚固防线。"
 building_zhouwanggong_01:0 "周王宫"
 building_zhouwanggong_01_desc:0 "周王宫是天子临朝与举行国家礼仪的政治中心。"
 building_zijin_01:0 "紫荆关"
 building_zijin_01_desc:0 "紫荆关控制太行山隘，是守卫北方腹地的重要屏障。"

 building_jiaodong_golden_mines_01:0 "胶东金矿"
 building_jiaodong_golden_mines_01_desc:0 "胶东蕴藏的金矿为当地带来稳定而可观的财富。"
