 building_Xinglong_golden_mines_04:0 "兴隆金矿群"
 building_Xinglong_golden_mines_04_desc:0 "兴隆金矿群源源不断地为国库输送财富。"
 building_lishui_golden_mines_01:0 "丽水金矿"
