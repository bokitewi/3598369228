 building_jiaodong_golden_mines_02_desc:0 "扩建后的矿井能够开采更深层的金矿脉。"
 building_jiaodong_golden_mines_03:0 "大型胶东金矿"
 building_jiaodong_golden_mines_03_desc:0 "成规模的采掘与冶炼设施显著提高了黄金产量。"
 building_jiaodong_golden_mines_04:0 "胶东金矿群"
