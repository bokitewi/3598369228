 building_lishui_golden_mines_02:0 "扩建的丽水金矿"
 building_lishui_golden_mines_02_desc:0 "更深的矿井和更好的工具提高了丽水金矿产量。"
 building_lishui_golden_mines_03:0 "大型丽水金矿"
 building_lishui_golden_mines_03_desc:0 "大型采矿聚落围绕丽水金矿逐渐形成。"
 building_lishui_golden_mines_04:0 "丽水金矿群"
 building_lishui_golden_mines_04_desc:0 "成熟的丽水金矿群带来巨额黄金收入。"
 building_yaan_golden_mines_01:0 "雅安金矿"
 building_yaan_golden_mines_01_desc:0 "雅安群山中的矿脉能够开采出黄金。"
 building_yaan_golden_mines_02:0 "扩建的雅安金矿"
 building_yaan_golden_mines_02_desc:0 "扩建后的雅安金矿具备更高的采掘效率。"
 building_yaan_golden_mines_03:0 "大型雅安金矿"
 building_yaan_golden_mines_03_desc:0 "完善的矿井与冶炼作坊提高了黄金产量。"
 building_yaan_golden_mines_04:0 "雅安金矿群"
 building_yaan_golden_mines_04_desc:0 "雅安金矿群已成为当地经济的支柱。"
 building_jiaodong_crystal_mines_01:0 "胶东水晶矿"
 building_jiaodong_crystal_mines_01_desc:0 "胶东矿脉出产晶莹剔透、价值不菲的水晶。"
 building_jiaodong_crystal_mines_02:0 "扩建的胶东水晶矿"
 building_jiaodong_crystal_mines_02_desc:0 "扩建的矿井能够稳定供应更多优质水晶。"
 building_linzi_iron_mines_01:0 "临淄铁矿"
 building_linzi_iron_mines_01_desc:0 "临淄铁矿为农具、兵器与建筑提供大量铁料。"
 building_xuzhou_iron_mines_01:0 "徐州铁矿"
 building_xuzhou_iron_mines_01_desc:0 "徐州铁矿开始为周边工坊供应铁矿石。"
 building_xuzhou_iron_mines_02:0 "扩建的徐州铁矿"
 building_xuzhou_iron_mines_02_desc:0 "扩建后的徐州铁矿产量稳定增长。"
 building_xuzhou_iron_mines_03:0 "大型徐州铁矿"
 building_xuzhou_iron_mines_03_desc:0 "大型矿井和冶铁工坊支撑着繁盛的军需生产。"
 building_xuzhou_iron_mines_04:0 "徐州铁矿群"
 building_xuzhou_iron_mines_04_desc:0 "徐州铁矿群为整个领地提供充足的优质铁料。"
