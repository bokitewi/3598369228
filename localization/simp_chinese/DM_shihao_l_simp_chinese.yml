 death_shihao.006.f2:0 "先君克尽无恩惠，曰使，谥号使子！"
 death_shihao.006.g2:0 "先君好和不争，生而少断，曰安，谥号安子！"
 death_shihao.006.h2:0 "先君道大而德一，大亲民而不杀，曰思，谥号思子！"
 death_shihao.006.i2:0 "先君行见中外，表里如一，曰悫，谥号悫子！"
 death_shihao.006.j2:0 "先君状古述今，立言之称，曰誉，谥号誉子！"
 death_shihao.006.k2:0 "先君大昭功宁民，明有功者，曰商，谥号商子！"
 death_shihao.006.l2:0 "先君秉政不任贤，安心好静，曰夷，谥号夷子！"
 death_shihao.006.m2:0 "先君执义扬善，慈仁短折，曰怀，谥号怀子！"
 death_shihao.006.n2:0 "先君述义不克，不能成义，曰丁，谥号丁子！"
 death_shihao.006.o2:0 "先君以武立功，有功安民，秉德尊业，曰烈，谥号烈子！"
 death_shihao.006.p2:0 "先君刚克为伐，思虑深远，曰翼，谥号翼子！"
 death_shihao.006.q2:0 "先君正而复，终始一外内贞复，曰白，谥号白子！"
 death_shihao.006.r2:0 "先君任本性，不见贤思齐，渎鬼神不致远，曰灵，谥号灵子！"
 death_shihao.006.s2:0 "先君杀戮无辜，曰厉，谥号厉子！"
 death_shihao.006.t2:0 "先君去谏曰愎，反是曰恨，曰刺，谥号刺子！"
 death_shihao.006.u2:0 "先君恭仁短折，体恭质仁，功未施，曰哀，谥号哀子！"
 death_shihao.006.v2:0 "先君好变动民，曰躁，谥号躁子！"
 death_shihao.006.w2:0 "先君不悔前过，曰戾，谥号戾子！"
 death_shihao.006.x2:0 "先君怙威肆行，曰丑，谥号丑子！"
 death_shihao.006.y2:0 "先君壅遏不通，动祭乱常，曰幽，谥号幽子！"
 death_shihao.006.z2:0 "先君柔质受谏，以虚受人，曰慧，谥号慧子！"
 death_shihao.006.a3:0 "先君名实不爽，曰质，谥号质子！"
 death_shihao.006.b3:0 "先君温良好乐，曰良，谥号良子！"
 death_shihao.006.c3:0 "先君能使人皆服其慈和，曰顺，谥号顺子！"
 death_shihao.006.d3:0 "先君博闻多能，曰宪，谥号宪子！"
 death_shihao.006.e3:0 "先君满志多穷，曰惑，谥号惑子！"
 death_shihao.006.f3:0 "先君思虑不爽，曰厚，谥号厚子！"
 death_shihao.006.g3:0 "先君好内远礼，不率礼，不亲长，曰炀，谥号炀子！"
 death_shihao.006.h3:0 "先君内外宾服，曰正，谥号正子！"
 death_shihao.006.i3:0 "先君明义以盖前过，彰义掩过，曰坚，谥号坚子！"
 death_shihao.006.j3:0 "先君华言无实，曰夸，谥号夸子！"
 death_shihao.006.k3:0 "先君背尊大而逆之，逆天虐民，曰抗，谥号抗子！"
 death_shihao.006.l3:0 "先君名与实爽，曰缪，谥号缪子！"
 death_shihao.006.m3:0 "先君择善而从，曰比，谥号比子！"
 death_shihao.006.n3:0 "先君幼少短折，曰冲，谥号冲子！"
 death_shihao.006.o3:0 "先君应变远方、不疾而速，曰神，谥号神子！"
 death_shihao.006.p3:0 "先君沉静寡言，曰慎，谥号慎子！"
 death_shihao.006.q3:0 "先君克启行禩，曰太，谥号太子！"
 death_shihao.006.r3:0 "先君不幸短命，曰渊，谥号渊子！"
 death_shihao.006.s3:0 "先君法度明大，出言有文，曰章，谥号章子！"
 death_shihao.006.t3:0 "先君肇敏行成，不隐无藏，曰真，谥号真子！"
 death_shihao.006.u3:0 "先君圣知通微，虑周事表，曰睿，谥号睿子！"
 death_shihao.006.v3:0 "先君小心畏忌，恭慎无过，曰僖，谥号僖子！"
 death_shihao.006.w3:0 "先君有威而敏行，虽威不逆礼，曰魏，谥号魏子！"

