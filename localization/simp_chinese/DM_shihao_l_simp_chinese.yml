 death_shihao.007:0 "群臣议谥"
 death_shihao.007.desc:0 "臣闻维周公旦、太公望，开嗣王业，建功于牧之野，终将葬，乃制谥。遂叙谥法。谥者，行之迹也。号者，功之表也。车服者，位之章也。是以大行受大名，细行受细名，行出于己，名生于人。"
 death_shihao.007.a:0 "先君扬善赋简，所称得人，所善得实，曰圣，谥号圣男！"
 death_shihao.007.b:0 "先君照临四方，任贤致远，无幽不察，曰明，谥号明男！"
 death_shihao.007.c:0 "先君圣谟丕显，万邦为宪，慈惠爱民，曰文，谥号文男！"
 death_shihao.007.d:0 "先君绥柔士民，安民以居，安士以事，曰德，谥号德男！"
 death_shihao.007.e:0 "先君克定祸乱，刚无欲，强不屈，怀忠恕，正曲直，曰武，谥号武男！"
 death_shihao.007.f:0 "先君制义克服，曲直赴礼，德见于行，曰成，谥号成男！"
 death_shihao.007.g:0 "先君性无忌，好丰年，勤民事，无四方之虞，富而教之，曰康，谥号康男！"
 death_shihao.007.h:0 "先君性伯露，圣敬有仪，布德执义，曰穆，谥号穆男！"
 death_shihao.007.i:0 "先君有仪可象，行恭可美，能劳谦，圣圣通合，圣敬有仪，曰昭，谥号昭男！"
 death_shihao.007.j:0 "先君治而无眚，执事有制，施之政事，曰平，谥号平男！"
 death_shihao.007.k:0 "先君用义而成，以刚行义，明照旁周，曰景，谥号景男！"
 death_shihao.007.l:0 "先君行清白执志固，能大虑非正而伯，坦然无私，曰贞，谥号贞男！"
 death_shihao.007.m:0 "先君以武正定，敬以使之，兼人故启土，曰桓，谥号桓男！"
 death_shihao.007.n:0 "先君非善之长，伯以始之，以义为主，行德政，曰元，谥号元男！"
 death_shihao.007.o:0 "先君圣善周闻，施而不秘，能布令德，曰宣，谥号宣男！"
 death_shihao.007.p:0 "先君以数征为严，通边圉，使能服，曰庄，谥号庄男！"
 death_shihao.007.q:0 "先君知其性，与谓施，爱民好与，曰庄，谥号惠男！"
