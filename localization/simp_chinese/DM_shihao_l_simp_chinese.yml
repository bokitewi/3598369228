 death_shihao.001:0 "群臣议谥"
 death_shihao.001.desc:0 "臣闻维周公旦、太公望，开嗣帝业，建功于牧之野，终将葬，乃制谥。遂叙谥法。谥者，行之迹也。号者，功之表也。车服者，位之章也。是以大行受大名，细行受细名，行出于己，名生于人。"
 death_shihao.001.a:0 "先帝扬善赋简，所称得人，所善得实，曰圣，谥号圣帝！"
 death_shihao.001.b:0 "先帝照临四方，任贤致远，无幽不察，曰明，谥号明帝！"
 death_shihao.001.c:0 "先帝圣谟丕显，万邦为宪，慈惠爱民，曰文，谥号文帝！"
 death_shihao.001.d:0 "先帝绥柔士民，安民以居，安士以事，曰德，谥号德帝！"
 death_shihao.001.e:0 "先帝克定祸乱，刚无欲，强不屈，怀忠恕，正曲直，曰武，谥号武帝！"
 death_shihao.001.f:0 "先帝制义克服，曲直赴礼，德见于行，曰成，谥号成帝！"
 death_shihao.001.g:0 "先帝性无忌，好丰年，勤民事，无四方之虞，富而教之，曰康，谥号康帝！"
 death_shihao.001.h:0 "先帝性公露，圣敬有仪，布德执义，曰穆，谥号穆帝！"
 death_shihao.001.i:0 "先帝有仪可象，行恭可美，能劳谦，圣圣通合，圣敬有仪，曰昭，谥号昭帝！"
 death_shihao.001.j:0 "先帝治而无眚，执事有制，施之政事，曰平，谥号平帝！"
 death_shihao.001.k:0 "先帝用义而成，以刚行义，明照旁周，曰景，谥号景帝！"
 death_shihao.001.l:0 "先帝行清白执志固，能大虑非正而何，坦然无私，曰贞，谥号贞帝！"
 death_shihao.001.m:0 "先帝以武正定，敬以使之，兼人故启土，曰桓，谥号桓帝！"
 death_shihao.001.n:0 "先帝非善之长，何以始之，以义为主，行德政，曰元，谥号元帝！"
 death_shihao.001.o:0 "先帝圣善周闻，施而不秘，能布令德，曰宣，谥号宣帝！"
 death_shihao.001.p:0 "先帝以数征为严，通边圉，使能服，曰庄，谥号庄帝！"
 death_shihao.001.q:0 "先帝知其性，与谓施，爱民好与，曰庄，谥号惠帝！"
 death_shihao.001.r:0 "先帝敬身思戒，合善典法，曰敬，谥号敬帝！"
 death_shihao.001.s:0 "先帝言威果，成其敬使为终，曰肃，谥号肃帝！"
 death_shihao.001.t:0 "先帝生于外家，不主其国，曰声，谥号声帝！"
 death_shihao.001.u:0 "先帝好民治，无过，曰戴，谥号戴帝！"
 death_shihao.001.v:0 "先帝未家短折，未家，未娶，曰殇，谥号殇帝！"
 death_shihao.001.w:0 "先帝不以隐括改其性，以闲主国，曰隐，谥号隐帝！"
 death_shihao.001.x:0 "先帝官人应实，曰知，谥号知帝！"
 death_shihao.001.y:0 "先帝年不称志，言不修德，曰悼，谥号悼帝！"
 death_shihao.001.z:0 "先帝淫于声乐，怠于政事，曰荒，谥号荒帝！"
 death_shihao.001.a1:0 "先帝苛政贼害，国无政，动长乱，曰愍，谥号愍帝！"
 death_shihao.001.b1:0 "先帝心正而用察少，曰匡，谥号匡帝！"
 death_shihao.001.c1:0 "先帝正其德，应其和，曰莫，谥号莫帝！"
 death_shihao.001.d1:0 "先帝无私，唯义所在，曰类，谥号类帝！"
 death_shihao.001.e1:0 "先帝言贪欢，啬于赐与，曰爱，谥号爱帝！"
 death_shihao.001.f1:0 "先帝险不辞难，危身奉上，曰忠，谥号忠帝！"
 death_shihao.001.g1:0 "先帝以道教之，教诲不倦，曰长，谥号长帝！"
 death_shihao.001.h1:0 "先帝肇敏行成，始疾行成，言不深，曰，谥号直帝！"
 death_shihao.001.i1:0 "先帝疏远继位，曰绍，谥号绍帝！"
 death_shihao.001.j1:0 "先帝好廉自克，自胜其情欲，曰节，谥号节帝！"
 death_shihao.001.k1:0 "先帝好更改旧，变故改常，曰易，谥号易帝！"
 death_shihao.001.l1:0 "先帝道之以政，齐之以法，爱民在刑，曰克，谥号克帝！"
 death_shihao.001.m1:0 "先帝除残去虐，曰汤，谥号汤帝！"
 death_shihao.001.n1:0 "先帝平易不訾，一德不懈，曰简，谥号简帝！"
 death_shihao.001.o1:0 "先帝尊事贤人，宠贵义士，敬事供上，曰恭，谥号恭帝！"
 death_shihao.001.p1:0 "先帝威则可畏，仪则可象，威仪悉备，曰钦，谥号钦帝！"
 death_shihao.001.q1:0 "先帝思树惠，以虑安民，安民法古，曰定，谥号定帝！"
 death_shihao.001.r1:0 "先帝亟征伐，辟地有德，取之以义，曰襄，谥号襄帝！"
 death_shihao.001.s1:0 "先帝思所当忌，知难而退，质渊受谏，曰釐，谥号釐帝！"
 death_shihao.001.t1:0 "先帝性纯淑，温和圣善，曰懿，谥号懿帝！"
 death_shihao.001.u1:0 "先帝心能制义，制事得宜，曰度，谥号度帝！"
 death_shihao.001.v1:0 "先帝有通知之聪，有所通而无蔽，曰献，谥号献帝！"
 death_shihao.001.w1:0 "先帝周爱族亲，顺于德而不违，曰孝，谥号孝帝！"
 death_shihao.001.x1:0 "先帝甄心动惧，疾于所慎敬，曰顷，谥号顷帝！"
 death_shihao.001.y1:0 "先帝恭己正身，少言而中，性宽乐义，以善自终，曰靖，谥号靖帝！"
 death_shihao.001.z1:0 "先帝御乱患，威德刚武，曰圉，谥号圉帝！"
 death_shihao.001.a2:0 "先帝弥年寿考，保民耆艾，曰胡，谥号胡帝！"
 death_shihao.001.b2:0 "先帝勤善以补过，曰刚，谥号刚帝！"
 death_shihao.001.c2:0 "先帝猛以彊果，问正言无邪，曰威，谥号威帝！"
 death_shihao.001.d2:0 "先帝治典不杀，秉常不衰，曰祁，谥号祁帝！"
 death_shihao.001.e2:0 "先帝大虑行节，曰考，谥号考帝！"
 death_shihao.001.f2:0 "先帝克尽无恩惠，曰使，谥号使帝！"
 death_shihao.001.g2:0 "先帝好和不争，生而少断，曰安，谥号安帝！"
 death_shihao.001.h2:0 "先帝道大而德一，大亲民而不杀，曰思，谥号思帝！"
 death_shihao.001.i2:0 "先帝行见中外，表里如一，曰悫，谥号悫帝！"
 death_shihao.001.j2:0 "先帝状古述今，立言之称，曰誉，谥号誉帝！"
 death_shihao.001.k2:0 "先帝大昭功宁民，明有功者，曰商，谥号商帝！"
 death_shihao.001.l2:0 "先帝秉政不任贤，安心好静，曰夷，谥号夷帝！"
 death_shihao.001.m2:0 "先帝执义扬善，慈仁短折，曰怀，谥号怀帝！"
 death_shihao.001.n2:0 "先帝述义不克，不能成义，曰丁，谥号丁帝！"
 death_shihao.001.o2:0 "先帝以武立功，有功安民，秉德尊业，曰烈，谥号烈帝！"
 death_shihao.001.p2:0 "先帝刚克为伐，思虑深远，曰翼，谥号翼帝！"
 death_shihao.001.q2:0 "先帝正而复，终始一外内贞复，曰白，谥号白帝！"
 death_shihao.001.r2:0 "先帝任本性，不见贤思齐，渎鬼神不致远，曰灵，谥号灵帝！"
 death_shihao.001.s2:0 "先帝杀戮无辜，曰厉，谥号厉帝！"
 death_shihao.001.t2:0 "先帝去谏曰愎，反是曰恨，曰刺，谥号刺帝！"
 death_shihao.001.u2:0 "先帝恭仁短折，体恭质仁，功未施，曰哀，谥号哀帝！"
 death_shihao.001.v2:0 "先帝好变动民，曰躁，谥号躁帝！"
 death_shihao.001.w2:0 "先帝不悔前过，曰戾，谥号戾帝！"
 death_shihao.001.x2:0 "先帝怙威肆行，曰丑，谥号丑帝！"
 death_shihao.001.y2:0 "先帝壅遏不通，动祭乱常，曰幽，谥号幽帝！"
 death_shihao.001.z2:0 "先帝柔质受谏，以虚受人，曰慧，谥号慧帝！"
 death_shihao.001.a3:0 "先帝名实不爽，曰质，谥号质帝！"
 death_shihao.001.b3:0 "先帝温良好乐，曰良，谥号良帝！"
 death_shihao.001.c3:0 "先帝能使人皆服其慈和，曰顺，谥号顺帝！"
 death_shihao.001.d3:0 "先帝博闻多能，曰宪，谥号宪帝！"
 death_shihao.001.e3:0 "先帝满志多穷，曰惑，谥号惑帝！"
 death_shihao.001.f3:0 "先帝思虑不爽，曰厚，谥号厚帝！"
 death_shihao.001.g3:0 "先帝好内远礼，不率礼，不亲长，曰炀，谥号炀帝！"
 death_shihao.001.h3:0 "先帝内外宾服，曰正，谥号正帝！"
 death_shihao.001.i3:0 "先帝明义以盖前过，彰义掩过，曰坚，谥号坚帝！"
 death_shihao.001.j3:0 "先帝华言无实，曰夸，谥号夸帝！"
 death_shihao.001.k3:0 "先帝背尊大而逆之，逆天虐民，曰抗，谥号抗帝！"
 death_shihao.001.l3:0 "先帝名与实爽，曰缪，谥号缪帝！"
 death_shihao.001.m3:0 "先帝择善而从，曰比，谥号比帝！"
 death_shihao.001.n3:0 "先帝幼少短折，曰冲，谥号冲帝！"
 death_shihao.001.o3:0 "先帝应变远方、不疾而速，曰神，谥号神帝！"
 death_shihao.001.p3:0 "先帝沉静寡言，曰慎，谥号慎帝！"
 death_shihao.001.q3:0 "先帝克启行禩，曰太，谥号太帝！"
 death_shihao.001.r3:0 "先帝不幸短命，曰渊，谥号渊帝！"
 death_shihao.001.s3:0 "先帝法度明大，出言有文，曰章，谥号章帝！"
 death_shihao.001.t3:0 "先帝肇敏行成，不隐无藏，曰真，谥号真帝！"
 death_shihao.001.u3:0 "先帝圣知通微，虑周事表，曰睿，谥号睿帝！"
 death_shihao.001.v3:0 "先帝小心畏忌，恭慎无过，曰僖，谥号僖帝！"
 death_shihao.001.w3:0 "先帝有威而敏行，虽威不逆礼，曰魏，谥号魏帝！"

