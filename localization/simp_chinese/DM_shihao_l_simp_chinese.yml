 death_shihao.004:0 "群臣议谥"
 death_shihao.004.desc:0 "臣闻维周公旦、太公望，开嗣王业，建功于牧之野，终将葬，乃制谥。遂叙谥法。谥者，行之迹也。号者，功之表也。车服者，位之章也。是以大行受大名，细行受细名，行出于己，名生于人。"
 death_shihao.004.a:0 "先君扬善赋简，所称得人，所善得实，曰圣，谥号圣侯！"
 death_shihao.004.b:0 "先君照临四方，任贤致远，无幽不察，曰明，谥号明侯！"
 death_shihao.004.c:0 "先君圣谟丕显，万邦为宪，慈惠爱民，曰文，谥号文侯！"
 death_shihao.004.d:0 "先君绥柔士民，安民以居，安士以事，曰德，谥号德侯！"
 death_shihao.004.e:0 "先君克定祸乱，刚无欲，强不屈，怀忠恕，正曲直，曰武，谥号武侯！"
 death_shihao.004.f:0 "先君制义克服，曲直赴礼，德见于行，曰成，谥号成侯！"
 death_shihao.004.g:0 "先君性无忌，好丰年，勤民事，无四方之虞，富而教之，曰康，谥号康侯！"
 death_shihao.004.h:0 "先君性侯露，圣敬有仪，布德执义，曰穆，谥号穆侯！"
 death_shihao.004.i:0 "先君有仪可象，行恭可美，能劳谦，圣圣通合，圣敬有仪，曰昭，谥号昭侯！"
 death_shihao.004.j:0 "先君治而无眚，执事有制，施之政事，曰平，谥号平侯！"
 death_shihao.004.k:0 "先君用义而成，以刚行义，明照旁周，曰景，谥号景侯！"
 death_shihao.004.l:0 "先君行清白执志固，能大虑非正而何，坦然无私，曰贞，谥号贞侯！"
 death_shihao.004.m:0 "先君以武正定，敬以使之，兼人故启土，曰桓，谥号桓侯！"
 death_shihao.004.n:0 "先君非善之长，何以始之，以义为主，行德政，曰元，谥号元侯！"
 death_shihao.004.o:0 "先君圣善周闻，施而不秘，能布令德，曰宣，谥号宣侯！"
 death_shihao.004.p:0 "先君以数征为严，通边圉，使能服，曰庄，谥号庄侯！"
 death_shihao.004.q:0 "先君知其性，与谓施，爱民好与，曰庄，谥号惠侯！"
 death_shihao.004.r:0 "先君敬身思戒，合善典法，曰敬，谥号敬侯！"
 death_shihao.004.s:0 "先君言威果，成其敬使为终，曰肃，谥号肃侯！"
 death_shihao.004.t:0 "先君生于外家，不主其国，曰声，谥号声侯！"
 death_shihao.004.u:0 "先君好民治，无过，曰戴，谥号戴侯！"
 death_shihao.004.v:0 "先君未家短折，未家，未娶，曰殇，谥号殇侯！"
 death_shihao.004.w:0 "先君不以隐括改其性，以闲主国，曰隐，谥号隐侯！"
 death_shihao.004.x:0 "先君官人应实，曰知，谥号知侯！"
 death_shihao.004.y:0 "先君年不称志，言不修德，曰悼，谥号悼侯！"
 death_shihao.004.z:0 "先君淫于声乐，怠于政事，曰荒，谥号荒侯！"
 death_shihao.004.a1:0 "先君苛政贼害，国无政，动长乱，曰愍，谥号愍侯！"
 death_shihao.004.b1:0 "先君心正而用察少，曰匡，谥号匡侯！"
 death_shihao.004.c1:0 "先君正其德，应其和，曰莫，谥号莫侯！"
 death_shihao.004.d1:0 "先君无私，唯义所在，曰类，谥号类侯！"
 death_shihao.004.e1:0 "先君言贪欢，啬于赐与，曰爱，谥号爱侯！"
 death_shihao.004.f1:0 "先君险不辞难，危身奉上，曰忠，谥号忠侯！"
 death_shihao.004.g1:0 "先君以道教之，教诲不倦，曰长，谥号长侯！"
 death_shihao.004.h1:0 "先君肇敏行成，始疾行成，言不深，曰，谥号直侯！"
 death_shihao.004.i1:0 "先君疏远继位，曰绍，谥号绍侯！"
 death_shihao.004.j1:0 "先君好廉自克，自胜其情欲，曰节，谥号节侯！"
 death_shihao.004.k1:0 "先君好更改旧，变故改常，曰易，谥号易侯！"
 death_shihao.004.l1:0 "先君道之以政，齐之以法，爱民在刑，曰克，谥号克侯！"
 death_shihao.004.m1:0 "先君除残去虐，曰汤，谥号汤侯！"
 death_shihao.004.n1:0 "先君平易不訾，一德不懈，曰简，谥号简侯！"
 death_shihao.004.o1:0 "先君尊事贤人，宠贵义士，敬事供上，曰恭，谥号恭侯！"
 death_shihao.004.p1:0 "先君威则可畏，仪则可象，威仪悉备，曰钦，谥号钦侯！"
 death_shihao.004.q1:0 "先君思树惠，以虑安民，安民法古，曰定，谥号定侯！"
 death_shihao.004.r1:0 "先君亟征伐，辟地有德，取之以义，曰襄，谥号襄侯！"
 death_shihao.004.s1:0 "先君思所当忌，知难而退，质渊受谏，曰釐，谥号釐侯！"
 death_shihao.004.t1:0 "先君性纯淑，温和圣善，曰懿，谥号懿侯！"
 death_shihao.004.u1:0 "先君心能制义，制事得宜，曰度，谥号度侯！"
 death_shihao.004.v1:0 "先君有通知之聪，有所通而无蔽，曰献，谥号献侯！"
 death_shihao.004.w1:0 "先君周爱族亲，顺于德而不违，曰孝，谥号孝侯！"
 death_shihao.004.x1:0 "先君甄心动惧，疾于所慎敬，曰顷，谥号顷侯！"
 death_shihao.004.y1:0 "先君恭己正身，少言而中，性宽乐义，以善自终，曰靖，谥号靖侯！"
 death_shihao.004.z1:0 "先君御乱患，威德刚武，曰圉，谥号圉侯！"
 death_shihao.004.a2:0 "先君弥年寿考，保民耆艾，曰胡，谥号胡侯！"
 death_shihao.004.b2:0 "先君勤善以补过，曰刚，谥号刚侯！"
 death_shihao.004.c2:0 "先君猛以彊果，问正言无邪，曰威，谥号威侯！"
 death_shihao.004.d2:0 "先君治典不杀，秉常不衰，曰祁，谥号祁侯！"
 death_shihao.004.e2:0 "先君大虑行节，曰考，谥号考侯！"
 death_shihao.004.f2:0 "先君克尽无恩惠，曰使，谥号使侯！"
 death_shihao.004.g2:0 "先君好和不争，生而少断，曰安，谥号安侯！"
 death_shihao.004.h2:0 "先君道大而德一，大亲民而不杀，曰思，谥号思侯！"
 death_shihao.004.i2:0 "先君行见中外，表里如一，曰悫，谥号悫侯！"
 death_shihao.004.j2:0 "先君状古述今，立言之称，曰誉，谥号誉侯！"
 death_shihao.004.k2:0 "先君大昭功宁民，明有功者，曰商，谥号商侯！"
 death_shihao.004.l2:0 "先君秉政不任贤，安心好静，曰夷，谥号夷侯！"
 death_shihao.004.m2:0 "先君执义扬善，慈仁短折，曰怀，谥号怀侯！"
 death_shihao.004.n2:0 "先君述义不克，不能成义，曰丁，谥号丁侯！"
 death_shihao.004.o2:0 "先君以武立功，有功安民，秉德尊业，曰烈，谥号烈侯！"
 death_shihao.004.p2:0 "先君刚克为伐，思虑深远，曰翼，谥号翼侯！"
 death_shihao.004.q2:0 "先君正而复，终始一外内贞复，曰白，谥号白侯！"
