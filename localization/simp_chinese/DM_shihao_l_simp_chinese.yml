 death_shihao.007.m2:0 "先君执义扬善，慈仁短折，曰怀，谥号怀男！"
 death_shihao.007.n2:0 "先君述义不克，不能成义，曰丁，谥号丁男！"
 death_shihao.007.o2:0 "先君以武立功，有功安民，秉德尊业，曰烈，谥号烈男！"
 death_shihao.007.p2:0 "先君刚克为伐，思虑深远，曰翼，谥号翼男！"
 death_shihao.007.q2:0 "先君正而复，终始一外内贞复，曰白，谥号白男！"
 death_shihao.007.r2:0 "先君任本性，不见贤思齐，渎鬼神不致远，曰灵，谥号灵男！"
 death_shihao.007.s2:0 "先君杀戮无辜，曰厉，谥号厉男！"
 death_shihao.007.t2:0 "先君去谏曰愎，反是曰恨，曰刺，谥号刺男！"
 death_shihao.007.u2:0 "先君恭仁短折，体恭质仁，功未施，曰哀，谥号哀男！"
 death_shihao.007.v2:0 "先君好变动民，曰躁，谥号躁男！"
 death_shihao.007.w2:0 "先君不悔前过，曰戾，谥号戾男！"
 death_shihao.007.x2:0 "先君怙威肆行，曰丑，谥号丑男！"
 death_shihao.007.y2:0 "先君壅遏不通，动祭乱常，曰幽，谥号幽男！"
 death_shihao.007.z2:0 "先君柔质受谏，以虚受人，曰慧，谥号慧男！"
 death_shihao.007.a3:0 "先君名实不爽，曰质，谥号质男！"
 death_shihao.007.b3:0 "先君温良好乐，曰良，谥号良男！"
 death_shihao.007.c3:0 "先君能使人皆服其慈和，曰顺，谥号顺男！"
 death_shihao.007.d3:0 "先君博闻多能，曰宪，谥号宪男！"
 death_shihao.007.e3:0 "先君满志多穷，曰惑，谥号惑男！"
 death_shihao.007.f3:0 "先君思虑不爽，曰厚，谥号厚男！"
 death_shihao.007.g3:0 "先君好内远礼，不率礼，不亲长，曰炀，谥号炀男！"
 death_shihao.007.h3:0 "先君内外宾服，曰正，谥号正男！"
 death_shihao.007.i3:0 "先君明义以盖前过，彰义掩过，曰坚，谥号坚男！"
 death_shihao.007.j3:0 "先君华言无实，曰夸，谥号夸男！"
 death_shihao.007.k3:0 "先君背尊大而逆之，逆天虐民，曰抗，谥号抗男！"
 death_shihao.007.l3:0 "先君名与实爽，曰缪，谥号缪男！"
 death_shihao.007.m3:0 "先君择善而从，曰比，谥号比男！"
 death_shihao.007.n3:0 "先君幼少短折，曰冲，谥号冲男！"
 death_shihao.007.o3:0 "先君应变远方、不疾而速，曰神，谥号神男！"
 death_shihao.007.p3:0 "先君沉静寡言，曰慎，谥号慎男！"
 death_shihao.007.q3:0 "先君克启行禩，曰太，谥号太男！"
 death_shihao.007.r3:0 "先君不幸短命，曰渊，谥号渊男！"
 death_shihao.007.s3:0 "先君法度明大，出言有文，曰章，谥号章男！"
 death_shihao.007.t3:0 "先君肇敏行成，不隐无藏，曰真，谥号真男！"
 death_shihao.007.u3:0 "先君圣知通微，虑周事表，曰睿，谥号睿男！"
 death_shihao.007.v3:0 "先君小心畏忌，恭慎无过，曰僖，谥号僖男！"
 death_shihao.007.w3:0 "先君有威而敏行，虽威不逆礼，曰魏，谥号魏男！"
 
