 death_shihao.005:0 "群臣议谥"
 death_shihao.005.desc:0 "臣闻维周公旦、太公望，开嗣王业，建功于牧之野，终将葬，乃制谥。遂叙谥法。谥者，行之迹也。号者，功之表也。车服者，位之章也。是以大行受大名，细行受细名，行出于己，名生于人。"
 death_shihao.005.a:0 "先君扬善赋简，所称得人，所善得实，曰圣，谥号圣伯！"
 death_shihao.005.b:0 "先君照临四方，任贤致远，无幽不察，曰明，谥号明伯！"
 death_shihao.005.c:0 "先君圣谟丕显，万邦为宪，慈惠爱民，曰文，谥号文伯！"
 death_shihao.005.d:0 "先君绥柔士民，安民以居，安士以事，曰德，谥号德伯！"
 death_shihao.005.e:0 "先君克定祸乱，刚无欲，强不屈，怀忠恕，正曲直，曰武，谥号武伯！"
 death_shihao.005.f:0 "先君制义克服，曲直赴礼，德见于行，曰成，谥号成伯！"
 death_shihao.005.g:0 "先君性无忌，好丰年，勤民事，无四方之虞，富而教之，曰康，谥号康伯！"
 death_shihao.005.h:0 "先君性伯露，圣敬有仪，布德执义，曰穆，谥号穆伯！"
 death_shihao.005.i:0 "先君有仪可象，行恭可美，能劳谦，圣圣通合，圣敬有仪，曰昭，谥号昭伯！"
 death_shihao.005.j:0 "先君治而无眚，执事有制，施之政事，曰平，谥号平伯！"
 death_shihao.005.k:0 "先君用义而成，以刚行义，明照旁周，曰景，谥号景伯！"
 death_shihao.005.l:0 "先君行清白执志固，能大虑非正而伯，坦然无私，曰贞，谥号贞伯！"
 death_shihao.005.m:0 "先君以武正定，敬以使之，兼人故启土，曰桓，谥号桓伯！"
 death_shihao.005.n:0 "先君非善之长，伯以始之，以义为主，行德政，曰元，谥号元伯！"
 death_shihao.005.o:0 "先君圣善周闻，施而不秘，能布令德，曰宣，谥号宣伯！"
 death_shihao.005.p:0 "先君以数征为严，通边圉，使能服，曰庄，谥号庄伯！"
 death_shihao.005.q:0 "先君知其性，与谓施，爱民好与，曰庄，谥号惠伯！"
 death_shihao.005.r:0 "先君敬身思戒，合善典法，曰敬，谥号敬伯！"
 death_shihao.005.s:0 "先君言威果，成其敬使为终，曰肃，谥号肃伯！"
 death_shihao.005.t:0 "先君生于外家，不主其国，曰声，谥号声伯！"
 death_shihao.005.u:0 "先君好民治，无过，曰戴，谥号戴伯！"
 death_shihao.005.v:0 "先君未家短折，未家，未娶，曰殇，谥号殇伯！"
 death_shihao.005.w:0 "先君不以隐括改其性，以闲主国，曰隐，谥号隐伯！"
 death_shihao.005.x:0 "先君官人应实，曰知，谥号知伯！"
 death_shihao.005.y:0 "先君年不称志，言不修德，曰悼，谥号悼伯！"
 death_shihao.005.z:0 "先君淫于声乐，怠于政事，曰荒，谥号荒伯！"
 death_shihao.005.a1:0 "先君苛政贼害，国无政，动长乱，曰愍，谥号愍伯！"
 death_shihao.005.b1:0 "先君心正而用察少，曰匡，谥号匡伯！"
 death_shihao.005.c1:0 "先君正其德，应其和，曰莫，谥号莫伯！"
 death_shihao.005.d1:0 "先君无私，唯义所在，曰类，谥号类伯！"
 death_shihao.005.e1:0 "先君言贪欢，啬于赐与，曰爱，谥号爱伯！"
 death_shihao.005.f1:0 "先君险不辞难，危身奉上，曰忠，谥号忠伯！"
 death_shihao.005.g1:0 "先君以道教之，教诲不倦，曰长，谥号长伯！"
 death_shihao.005.h1:0 "先君肇敏行成，始疾行成，言不深，曰，谥号直伯！"
 death_shihao.005.i1:0 "先君疏远继位，曰绍，谥号绍伯！"
 death_shihao.005.j1:0 "先君好廉自克，自胜其情欲，曰节，谥号节伯！"
 death_shihao.005.k1:0 "先君好更改旧，变故改常，曰易，谥号易伯！"
 death_shihao.005.l1:0 "先君道之以政，齐之以法，爱民在刑，曰克，谥号克伯！"
 death_shihao.005.m1:0 "先君除残去虐，曰汤，谥号汤伯！"
 death_shihao.005.n1:0 "先君平易不訾，一德不懈，曰简，谥号简伯！"
 death_shihao.005.o1:0 "先君尊事贤人，宠贵义士，敬事供上，曰恭，谥号恭伯！"
 death_shihao.005.p1:0 "先君威则可畏，仪则可象，威仪悉备，曰钦，谥号钦伯！"
 death_shihao.005.q1:0 "先君思树惠，以虑安民，安民法古，曰定，谥号定伯！"
 death_shihao.005.r1:0 "先君亟征伐，辟地有德，取之以义，曰襄，谥号襄伯！"
 death_shihao.005.s1:0 "先君思所当忌，知难而退，质渊受谏，曰釐，谥号釐伯！"
 death_shihao.005.t1:0 "先君性纯淑，温和圣善，曰懿，谥号懿伯！"
 death_shihao.005.u1:0 "先君心能制义，制事得宜，曰度，谥号度伯！"
 death_shihao.005.v1:0 "先君有通知之聪，有所通而无蔽，曰献，谥号献伯！"
 death_shihao.005.w1:0 "先君周爱族亲，顺于德而不违，曰孝，谥号孝伯！"
 death_shihao.005.x1:0 "先君甄心动惧，疾于所慎敬，曰顷，谥号顷伯！"
 death_shihao.005.y1:0 "先君恭己正身，少言而中，性宽乐义，以善自终，曰靖，谥号靖伯！"
 death_shihao.005.z1:0 "先君御乱患，威德刚武，曰圉，谥号圉伯！"
 death_shihao.005.a2:0 "先君弥年寿考，保民耆艾，曰胡，谥号胡伯！"
 death_shihao.005.b2:0 "先君勤善以补过，曰刚，谥号刚伯！"
 death_shihao.005.c2:0 "先君猛以彊果，问正言无邪，曰威，谥号威伯！"
 death_shihao.005.d2:0 "先君治典不杀，秉常不衰，曰祁，谥号祁伯！"
 death_shihao.005.e2:0 "先君大虑行节，曰考，谥号考伯！"
 death_shihao.005.f2:0 "先君克尽无恩惠，曰使，谥号使伯！"
 death_shihao.005.g2:0 "先君好和不争，生而少断，曰安，谥号安伯！"
 death_shihao.005.h2:0 "先君道大而德一，大亲民而不杀，曰思，谥号思伯！"
 death_shihao.005.i2:0 "先君行见中外，表里如一，曰悫，谥号悫伯！"
 death_shihao.005.j2:0 "先君状古述今，立言之称，曰誉，谥号誉伯！"
 death_shihao.005.k2:0 "先君大昭功宁民，明有功者，曰商，谥号商伯！"
 death_shihao.005.l2:0 "先君秉政不任贤，安心好静，曰夷，谥号夷伯！"
 death_shihao.005.m2:0 "先君执义扬善，慈仁短折，曰怀，谥号怀伯！"
 death_shihao.005.n2:0 "先君述义不克，不能成义，曰丁，谥号丁伯！"
 death_shihao.005.o2:0 "先君以武立功，有功安民，秉德尊业，曰烈，谥号烈伯！"
 death_shihao.005.p2:0 "先君刚克为伐，思虑深远，曰翼，谥号翼伯！"
 death_shihao.005.q2:0 "先君正而复，终始一外内贞复，曰白，谥号白伯！"
 death_shihao.005.r2:0 "先君任本性，不见贤思齐，渎鬼神不致远，曰灵，谥号灵伯！"
 death_shihao.005.s2:0 "先君杀戮无辜，曰厉，谥号厉伯！"
 death_shihao.005.t2:0 "先君去谏曰愎，反是曰恨，曰刺，谥号刺伯！"
 death_shihao.005.u2:0 "先君恭仁短折，体恭质仁，功未施，曰哀，谥号哀伯！"
 death_shihao.005.v2:0 "先君好变动民，曰躁，谥号躁伯！"
 death_shihao.005.w2:0 "先君不悔前过，曰戾，谥号戾伯！"
 death_shihao.005.x2:0 "先君怙威肆行，曰丑，谥号丑伯！"
 death_shihao.005.y2:0 "先君壅遏不通，动祭乱常，曰幽，谥号幽伯！"
 death_shihao.005.z2:0 "先君柔质受谏，以虚受人，曰慧，谥号慧伯！"
 death_shihao.005.a3:0 "先君名实不爽，曰质，谥号质伯！"
 death_shihao.005.b3:0 "先君温良好乐，曰良，谥号良伯！"
 death_shihao.005.c3:0 "先君能使人皆服其慈和，曰顺，谥号顺伯！"
 death_shihao.005.d3:0 "先君博闻多能，曰宪，谥号宪伯！"
 death_shihao.005.e3:0 "先君满志多穷，曰惑，谥号惑伯！"
 death_shihao.005.f3:0 "先君思虑不爽，曰厚，谥号厚伯！"
 death_shihao.005.g3:0 "先君好内远礼，不率礼，不亲长，曰炀，谥号炀伯！"
 death_shihao.005.h3:0 "先君内外宾服，曰正，谥号正伯！"
 death_shihao.005.i3:0 "先君明义以盖前过，彰义掩过，曰坚，谥号坚伯！"
 death_shihao.005.j3:0 "先君华言无实，曰夸，谥号夸伯！"
 death_shihao.005.k3:0 "先君背尊大而逆之，逆天虐民，曰抗，谥号抗伯！"
 death_shihao.005.l3:0 "先君名与实爽，曰缪，谥号缪伯！"
 death_shihao.005.m3:0 "先君择善而从，曰比，谥号比伯！"
 death_shihao.005.n3:0 "先君幼少短折，曰冲，谥号冲伯！"
 death_shihao.005.o3:0 "先君应变远方、不疾而速，曰神，谥号神伯！"
 death_shihao.005.p3:0 "先君沉静寡言，曰慎，谥号慎伯！"
 death_shihao.005.q3:0 "先君克启行禩，曰太，谥号太伯！"
 death_shihao.005.r3:0 "先君不幸短命，曰渊，谥号渊伯！"
 death_shihao.005.s3:0 "先君法度明大，出言有文，曰章，谥号章伯！"
 death_shihao.005.t3:0 "先君肇敏行成，不隐无藏，曰真，谥号真伯！"
 death_shihao.005.u3:0 "先君圣知通微，虑周事表，曰睿，谥号睿伯！"
 death_shihao.005.v3:0 "先君小心畏忌，恭慎无过，曰僖，谥号僖伯！"
 death_shihao.005.w3:0 "先君有威而敏行，虽威不逆礼，曰魏，谥号魏伯！"

