 death_shihao.008:0 "群臣议谥"
 death_shihao.008.desc:0 "臣闻维周公旦、太公望，开嗣王业，建功于牧之野，终将葬，乃制谥。遂叙谥法。谥者，行之迹也。号者，功之表也。车服者，位之章也。是以大行受大名，细行受细名，行出于己，名生于人。"

 death_shihao.003:0 "群臣议谥"
 death_shihao.003.desc:0 "臣闻维周公旦、太公望，开嗣王业，建功于牧之野，终将葬，乃制谥。遂叙谥法。谥者，行之迹也。号者，功之表也。车服者，位之章也。是以大行受大名，细行受细名，行出于己，名生于人。"
 death_shihao.003.a:0 "先君扬善赋简，所称得人，所善得实，曰圣，谥号圣公！"
 death_shihao.003.b:0 "先君照临四方，任贤致远，无幽不察，曰明，谥号明公！"
 death_shihao.003.c:0 "先君圣谟丕显，万邦为宪，慈惠爱民，曰文，谥号文公！"
 death_shihao.003.d:0 "先君绥柔士民，安民以居，安士以事，曰德，谥号德公！"
 death_shihao.003.e:0 "先君克定祸乱，刚无欲，强不屈，怀忠恕，正曲直，曰武，谥号武公！"
 death_shihao.003.f:0 "先君制义克服，曲直赴礼，德见于行，曰成，谥号成公！"
 death_shihao.003.g:0 "先君性无忌，好丰年，勤民事，无四方之虞，富而教之，曰康，谥号康公！"
 death_shihao.003.h:0 "先君性公露，圣敬有仪，布德执义，曰穆，谥号穆公！"
 death_shihao.003.i:0 "先君有仪可象，行恭可美，能劳谦，圣圣通合，圣敬有仪，曰昭，谥号昭公！"
 death_shihao.003.j:0 "先君治而无眚，执事有制，施之政事，曰平，谥号平公！"
 death_shihao.003.k:0 "先君用义而成，以刚行义，明照旁周，曰景，谥号景公！"
 death_shihao.003.l:0 "先君行清白执志固，能大虑非正而何，坦然无私，曰贞，谥号贞公！"
 death_shihao.003.m:0 "先君以武正定，敬以使之，兼人故启土，曰桓，谥号桓公！"
 death_shihao.003.n:0 "先君非善之长，何以始之，以义为主，行德政，曰元，谥号元公！"
 death_shihao.003.o:0 "先君圣善周闻，施而不秘，能布令德，曰宣，谥号宣公！"
 death_shihao.003.p:0 "先君以数征为严，通边圉，使能服，曰庄，谥号庄公！"
 death_shihao.003.q:0 "先君知其性，与谓施，爱民好与，曰庄，谥号惠公！"
 death_shihao.003.r:0 "先君敬身思戒，合善典法，曰敬，谥号敬公！"
 death_shihao.003.s:0 "先君言威果，成其敬使为终，曰肃，谥号肃公！"
 death_shihao.003.t:0 "先君生于外家，不主其国，曰声，谥号声公！"
 death_shihao.003.u:0 "先君好民治，无过，曰戴，谥号戴公！"
 death_shihao.003.v:0 "先君未家短折，未家，未娶，曰殇，谥号殇公！"
 death_shihao.003.w:0 "先君不以隐括改其性，以闲主国，曰隐，谥号隐公！"
 death_shihao.003.x:0 "先君官人应实，曰知，谥号知公！"
 death_shihao.003.y:0 "先君年不称志，言不修德，曰悼，谥号悼公！"
 death_shihao.003.z:0 "先君淫于声乐，怠于政事，曰荒，谥号荒公！"
 death_shihao.003.a1:0 "先君苛政贼害，国无政，动长乱，曰愍，谥号愍公！"
 death_shihao.003.b1:0 "先君心正而用察少，曰匡，谥号匡公！"
 death_shihao.003.c1:0 "先君正其德，应其和，曰莫，谥号莫公！"
