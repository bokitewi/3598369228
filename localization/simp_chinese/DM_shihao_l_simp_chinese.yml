 death_shihao.002.b3:0 "先王温良好乐，曰良，谥号良王！"
 death_shihao.002.c3:0 "先王能使人皆服其慈和，曰顺，谥号顺王！"
 death_shihao.002.d3:0 "先王博闻多能，曰宪，谥号宪王！"
 death_shihao.002.e3:0 "先王满志多穷，曰惑，谥号惑王！"
 death_shihao.002.f3:0 "先王思虑不爽，曰厚，谥号厚王！"
 death_shihao.002.g3:0 "先王好内远礼，不率礼，不亲长，曰炀，谥号炀王！"
 death_shihao.002.h3:0 "先王内外宾服，曰正，谥号正王！"
 death_shihao.002.i3:0 "先王明义以盖前过，彰义掩过，曰坚，谥号坚王！"
 death_shihao.002.j3:0 "先王华言无实，曰夸，谥号夸王！"
 death_shihao.002.k3:0 "先王背尊大而逆之，逆天虐民，曰抗，谥号抗王！"
 death_shihao.002.l3:0 "先王名与实爽，曰缪，谥号缪王！"
 death_shihao.002.m3:0 "先王择善而从，曰比，谥号比王！"
 death_shihao.002.n3:0 "先王幼少短折，曰冲，谥号冲王！"
 death_shihao.002.o3:0 "先王应变远方、不疾而速，曰神，谥号神王！"
 death_shihao.002.p3:0 "先王沉静寡言，曰慎，谥号慎王！"
 death_shihao.002.q3:0 "先王克启行禩，曰太，谥号太王！"
 death_shihao.002.r3:0 "先王不幸短命，曰渊，谥号渊王！"
 death_shihao.002.s3:0 "先王法度明大，出言有文，曰章，谥号章王！"
 death_shihao.002.t3:0 "先王肇敏行成，不隐无藏，曰真，谥号真王！"
 death_shihao.002.u3:0 "先王圣知通微，虑周事表，曰睿，谥号睿王！"
 death_shihao.002.v3:0 "先王小心畏忌，恭慎无过，曰僖，谥号僖王！"
 death_shihao.002.w3:0 "先王有威而敏行，虽威不逆礼，曰魏，谥号魏王！"

