 death_shihao.002.v2:0 "先王好变动民，曰躁，谥号躁王！"
 death_shihao.002.w2:0 "先王不悔前过，曰戾，谥号戾王！"
 death_shihao.002.x2:0 "先王怙威肆行，曰丑，谥号丑王！"
 death_shihao.002.y2:0 "先王壅遏不通，动祭乱常，曰幽，谥号幽王！"
 death_shihao.002.z2:0 "先王柔质受谏，以虚受人，曰慧，谥号慧王！"
