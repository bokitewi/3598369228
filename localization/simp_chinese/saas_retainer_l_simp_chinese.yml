l_simp_chinese:
 saas_courtier_stipend_law_group: "豢养门客"
 saas_courtier_stipend_law_group_desc: "规定领主按月发给实际廷臣的俸禄。宾客、囚犯与人物池角色不计入结算。"
 saas_no_stipend_law: "无俸禄"
 saas_no_stipend_law_effects: "廷臣月俸：#bold 0#!\n廷臣好感：#N -30#!\n廷臣离廷倾向：#N +10#!"
 saas_limited_stipend_law: "有限俸禄"
 saas_limited_stipend_law_effects: "每名廷臣月俸：#bold 0.05#![gold_i]\n廷臣好感：#N -10#!\n廷臣离廷倾向：#N +5#!"
 saas_normal_stipend_law: "正常俸禄"
 saas_normal_stipend_law_effects: "每名廷臣月俸：#bold 0.10#![gold_i]\n廷臣好感：无变化\n廷臣离廷倾向：无变化"
 saas_large_stipend_law: "大量俸禄"
 saas_large_stipend_law_effects: "每名廷臣月俸：#bold 0.15#![gold_i]\n廷臣好感：#P +10#!\n廷臣离廷倾向：#P -5#!"
 saas_double_stipend_law: "两倍俸禄"
 saas_double_stipend_law_effects: "每名廷臣月俸：#bold 0.20#![gold_i]\n廷臣好感：#P +30#!\n廷臣离廷倾向：#P -10#!"

 saas_personal_salary_raise_modifier: "个人加俸"
 saas_personal_salary_raise_modifier_desc: "该廷臣在普通俸禄之外额外领取50%的个人俸禄。"
 saas_courtier_stipend_expense_modifier: "廷臣俸禄"
 saas_courtier_stipend_expense_modifier_desc: "按当前政策支付给全部符合条件廷臣的每月俸禄。"
 saas_courtier_stipend_expense_scale_desc: "廷臣人数、俸禄政策及个人加俸"
 saas_courtier_stipend_income_modifier: "门客俸禄"
 saas_courtier_stipend_income_modifier_desc: "该人物作为廷臣从领主处领取的每月俸禄。"
 saas_courtier_stipend_income_scale_desc: "领主的俸禄政策及个人加俸"
 saas_salary_refused_modifier: "加俸遭拒"
 saas_salary_refused_modifier_desc: "该廷臣的加俸请求遭到拒绝，因而更倾向于离开宫廷。"
 saas_recruit_talent_edict_modifier: "招贤令"
 saas_recruit_talent_edict_modifier_desc: "此宫廷正在广招天下士人，并会与其他发布招贤令的诸侯争夺人才。"
 saas_retainer_defense_reform_modifier: "守备整饬"
 saas_retainer_defense_reform_modifier_desc: "门客重新编订守备名册、整顿武库并训练征召兵。"

 saas_retainer_patronage_opinion: "受到任用"
 saas_retainer_rejected_opinion: "建议遭拒"
 saas_salary_raise_granted_opinion: "获准加俸"
 saas_salary_raise_refused_opinion: "加俸遭拒"
 saas_retainer_project_success_opinion: "才能得到认可"
 saas_retainer_project_failure_opinion: "办事失利"
 saas_retainer_diplomatic_success_opinion: "使者斡旋"

 saas_recruit_talent_decision: "发布招贤令"
 saas_recruit_talent_decision_confirm: "颁布招贤令"
 saas_recruit_talent_decision_desc: "礼崩乐坏，士无定主。只要许以礼遇厚禄，天下怀才不遇之士便可能闻风而来。"
 saas_recruit_talent_decision_tooltip: "以国势、声望、宫廷显赫度和门客俸禄同其他诸侯争夺无职人才"
 saas_recruit_talent_decision_effect: "获得持续#V 5年#!的[GetModifier('saas_recruit_talent_edict_modifier').GetNameWithTooltip]；此决议有#V 10年#!冷却。"

 saas_elite_guest_arrived_title: "名士来访"
 saas_elite_guest_arrived_desc: "精英人才[saas_elite_guest.GetShortUIName]已作为宾客投奔你的宫廷。"
 saas_elite_adventurer_spawned_title: "名士踏上征途"
 saas_elite_adventurer_spawned_desc: "精英人才[saas_elite_guest.GetShortUIName]在你的领地现身，随后建立营地，成为了一名冒险者。"

 saas_retainer.1100.t: "门客自荐：投资理财"
 saas_retainer.1100.desc: "[retainer.GetShortUIName]呈上一份经营财货的策书，声称只需数月便可使投入翻倍。其言辞颇有把握，但本钱若蚀尽，也只能由我承担。"
 saas_retainer.1100.a: "先交给[retainer.GetHerHim]10[gold_i]试试。"
 saas_retainer.1100.b: "拨给[retainer.GetHerHim]25[gold_i]。"
 saas_retainer.1100.c: "要做便做大，投入50[gold_i]！"
 saas_retainer.1100.d: "我的钱财另有用处。"
 saas_retainer.1101.t: "门客承办：理财结果"
 saas_retainer.1101.desc.success: "[retainer.GetShortUIName]带着清楚的账册和丰厚收益归来。这番经营果然使投入翻了一倍。"
 saas_retainer.1101.desc.failure: "[retainer.GetShortUIName]空手而归。市场与人心都未按预想行事，投入的钱财已无法追回。"
 saas_retainer.1101.desc.invalid: "世事变迁使这项经营无法继续，账目与投入也随之散失。"
 saas_retainer.1101.a: "这正是我所需的才干。"
 saas_retainer.1101.b: "只能当作一次教训。"
 saas_retainer.1101.c: "此事已经无从追究。"

 saas_retainer.1200.t: "门客自荐：出使邻国"
 saas_retainer.1200.desc: "[retainer.GetShortUIName]请求出使[neighboring_ruler.GetShortUIName]的宫廷，认为凭借辞令与礼物足以缓和两国关系。"
 saas_retainer.1200.a: "给[retainer.GetHerHim]15[gold_i]作为使费。"
 saas_retainer.1200.b: "此时不宜遣使。"
 saas_retainer.1201.t: "门客承办：出使结果"
 saas_retainer.1201.desc.success: "[retainer.GetShortUIName]圆满完成使命。[neighboring_ruler.GetShortUIName]不仅接受了礼物，也对我的诚意深表赞许。"
 saas_retainer.1201.desc.failure: "[retainer.GetShortUIName]的辞令未能打动[neighboring_ruler.GetShortUIName]，这次出使没有取得成果。"
 saas_retainer.1201.desc.invalid: "使团尚未完成使命，局势便已改变，这次出使只能无功而返。"
 saas_retainer.1201.a: "善。两国由此修好。"
 saas_retainer.1201.b: "至少没有酿成祸端。"
 saas_retainer.1201.c: "时势如此，非人力可为。"

 saas_retainer.1300.t: "门客自荐：整顿守备"
 saas_retainer.1300.desc: "[retainer.GetShortUIName]巡视都城后，指出武库、城门与征召名册多有废弛，并请求主持一次全面整顿。"
 saas_retainer.1300.a: "拨给[retainer.GetHerHim]15[gold_i]整顿守备。"
 saas_retainer.1300.b: "旧制尚可沿用。"
 saas_retainer.1301.t: "门客承办：守备结果"
 saas_retainer.1301.desc.success: "[retainer.GetShortUIName]完成了整顿。城门戒备森严，武库井然有序，乡里的征召名册也已重新核定。"
 saas_retainer.1301.desc.failure: "整顿处处受到阻碍。[retainer.GetShortUIName]虽耗费许多精力，却没能令守备真正改观。"
 saas_retainer.1301.desc.invalid: "局势骤变，原定的守备整顿已无法继续。"
 saas_retainer.1301.a: "都城可安，我心甚慰。"
 saas_retainer.1301.b: "看来积弊不是一朝能除。"
 saas_retainer.1301.c: "先料理眼前之事。"

 saas_retainer.1400.t: "门客自荐：清查侵吞"
 saas_retainer.1400.desc: "[retainer.GetShortUIName]察觉账目间有可疑缺口，怀疑有人侵吞公帑，并愿秘密追查此事。"
 saas_retainer.1400.a: "给[retainer.GetHerHim]15[gold_i]作为查案经费。"
 saas_retainer.1400.b: "不要搅得宫中人人自危。"
 saas_retainer.1401.t: "门客承办：清查结果"
 saas_retainer.1401.desc.success: "[retainer.GetShortUIName]循着账目与口供找到了藏匿的钱财。涉事者已经伏罪，众人也因此更加畏惧我的耳目。"
 saas_retainer.1401.desc.failure: "线索最终断了。[retainer.GetShortUIName]未能追回钱财，反而使不少廷臣对这场清查心怀不满。"
 saas_retainer.1401.desc.invalid: "主持清查的人事与局势已经改变，此案只能暂且搁置。"
 saas_retainer.1401.a: "钱要追回，规矩也要立下。"
 saas_retainer.1401.b: "到此为止吧。"
 saas_retainer.1401.c: "把旧案卷封存起来。"

 saas_retainer.1500.t: "门客自荐：整理礼制农政"
 saas_retainer.1500.desc: "[retainer.GetShortUIName]认为旧典、农书和地方簿册散乱不堪，请求召集书吏加以校订，使礼制与农政皆有章可循。"
 saas_retainer.1500.a: "拨给[retainer.GetHerHim]15[gold_i]整理典籍。"
 saas_retainer.1500.b: "眼下还没有这份余裕。"
 saas_retainer.1501.t: "门客承办：典籍整理"
 saas_retainer.1501.desc.success: "[retainer.GetShortUIName]将散佚文书编成了条理清楚的新册。官吏据此施政，士民也更明白礼法与农时。"
 saas_retainer.1501.desc.failure: "文书浩繁而且彼此矛盾。[retainer.GetShortUIName]没能在期限内编成可用的成果。"
 saas_retainer.1501.desc.invalid: "主持者或局势已经改变，整理典籍的工作就此中断。"
 saas_retainer.1501.a: "此书足以惠及后世。"
 saas_retainer.1501.b: "先将残稿收好。"
 saas_retainer.1501.c: "暂且搁置吧。"

 saas_retainer.1600.t: "门客请求加俸"
 saas_retainer.1600.desc: "[retainer.GetShortUIName]直言自己的才干与劳苦并未得到足够回报，要求未来五年在普通俸禄之外再加五成。"
 saas_retainer.1600.a: "人才理当厚养。"
 saas_retainer.1600.b: "现行俸禄已经足够。"
