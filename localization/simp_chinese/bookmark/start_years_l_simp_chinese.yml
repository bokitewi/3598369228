 bm_group_pmrta770: "BC770"
  bm_pmrta770: "二王并立"
  bm_pmrta770_desc: "公元前771年，废太子宜臼在申侯的拥护下，联合缯国和犬戎引兵攻入镐京，杀其父周幽王骊山下，西周灭亡。但幽王之死没有平息王室的政治危机，反而将诸侯间的对立彻底引爆。公元前770年，宜臼在畿外诸侯的拥立下即位，史称平王；虢公翰则与畿内诸侯扶持幽王之弟余臣为王，史称周携王。二王并立，诸夏内斗，周王朝威信扫地，曾经用于维系统治的礼法制度开始崩溃。王朝的陨落和诸侯间加剧的斗争让分布在周边的四夷躁动起来，各个部落虎视眈眈，随时准备大举进犯中原，一时之间整个华夏文明岌岌可危。"
  bm770_rise_from_end: "始于毫末"
  bm770_rise_from_end_desc: "公元前771年，废太子宜臼在申侯的拥护下，联合缯国和犬戎引兵攻入镐京，杀其父周幽王骊山下，西周灭亡。但幽王之死没有平息王室的政治危机，反而将诸侯间的对立彻底引爆。公元前770年，宜臼在畿外诸侯的拥立下即位，史称平王；虢公翰则与畿内诸侯扶持幽王之弟余臣为王，史称周携王。二王并立，诸夏内斗，周王朝威信扫地，曾经用于维系统治的礼法制度开始崩溃。王朝的陨落和诸侯间加剧的斗争让分布在周边的四夷躁动起来，各个部落虎视眈眈，随时准备大举进犯中原，一时之间整个华夏文明岌岌可危。"

  start_year_3850_01_01: "公元前770年"
  start_year_3850_01_01_desc: "公元前771年，废太子宜臼在申侯的拥护下，联合缯国和犬戎引兵攻入镐京，杀其父周幽王骊山下，西周灭亡。但幽王之死没有平息王室的政治危机，反而将诸侯间的对立彻底引爆。公元前770年，宜臼在畿外诸侯的拥立下即位，史称平王；虢公翰则与畿内诸侯扶持幽王之弟余臣为王，史称周携王。二王并立，诸夏内斗，周王朝威信扫地，曾经用于维系统治的礼法制度开始崩溃。王朝的陨落和诸侯间加剧的斗争让分布在周边的四夷躁动起来，各个部落虎视眈眈，随时准备大举进犯中原，一时之间整个华夏文明岌岌可危。"

  kai_subheading: "秦襄公"
  kai_desc: "秦人祖居东方，因先祖非子养马有功被分封在秦地，长年以来秦人一直同戎狄交战，拱卫王室。公元前771年镐京沦陷，幽王身死，赢开率军护送天子宜臼，因拥立有功而被封为诸侯，获得岐山以西的土地，至此秦国立国。\n\n#bold 王畿已沦为焦土，四周戎狄摩拳擦掌，无不对新生的秦国虎视眈眈，野心勃勃的赢开能否实现自己的梦想，带领秦国走向强盛，还终被滚滚历史烟尘吞没？#!"
  bfyznan362_subheading: "大戎主"
  bfyznan362_desc: "大戎主玷厥俯视着化为废墟的镐京和仓皇逃命的周王室，屹立在周王畿残躯上的玷厥如今权威已达到顶峰，前往中原的道路畅通无阻。\n\n#bold 然而玷厥知道，百足之虫死而不僵，庞大的周王朝破碎的躯壳对犬戎部落仍是巨人般的存在，你能否带领犬戎部落打败诸夏，入主中原，还是最终难逃被诸夏吞噬的命运？#!"
  chou1_subheading: "晋文侯"
  chou1_desc: "公元前781年，姬仇终于打败了自己的叔父殇叔，夺回属于自己的君位，但平稳的日子并没有持续多久，公元前771年，王室内乱，姬仇敏锐地选择全力支持宜臼即位，与赢开和姬掘突共同护送天子宜臼前往更安全的畿外地区，同时对抗留在畿内，僭越称王的余臣。\n\n#bold 护送有功的姬仇为晋国谋取了大量利益，晋国的权势已不可小觑，你能否充分利用你的才能继续拥护宜臼，结束王室的动乱，或者走上与历史截然不同的道路？#!"
  gou_subheading: "齐庄公"
  gou_desc: "作为最早的诸侯国之一，齐国一直扎根于东土对抗东夷，长期以来一直被王室所倚重。此时吕购治下的齐国刚刚从长达四十年的内斗中走出，然而西土的巨变却让齐国再次紧绷起来，王室内斗永久的改变了诸侯间的政治格局，周德衰微、诸侯崛起、四夷肆虐，中原动荡不安。\n\n#bold 你能否带领齐国在这动荡的时代中立足，安稳度过这礼崩乐坏的乱世，还是最终成为历史的一粒尘埃？#!"
  juetu_subheading: "郑武公"
  juetu_desc: "姬掘突本应该在那片富庶的西土之地兢兢业业度过一生，然而王室内斗和犬戎的大举入侵，让绵延百年的周王朝分崩离析，周幽王死在骊山下，掘突的父亲姬友也殉国于王事。曾经的家园沦沦为焦土，掘突只能护送新即位的天子宜臼，迁徙去更加安全的畿外地区。\n\n#bold 如今郑国已在中原立稳脚跟，然而周王朝仍深陷于内战之中，作为王室的一员，担任着卿士重任的掘突能否再造周公旦的传说，辅佐王室再次复兴，亦或是彻底沦为诸夏争斗的牺牲品？#!"

  nanming157_subheading: "宋戴公"
  nanming157_desc: "宋国先祖微子曾是商王朝最后一位君主纣王帝辛的长兄，却因继承法而与王位失之交臂。周灭商后，微子被封于宋，以延续商朝的宗庙。子㧑作为第十一代君主，因廉洁爱民而被他的臣民所爱戴。\n\n#bold 如今中原陷入危机之中，周王朝分崩离析，你能否恪守先祖微子的道路，尽心辅助周王室渡过难关，亦或是趁机称霸中原复辟商王朝？#!"

  yijiu_subheading: "周平王"
  yijiu_desc: "姬宜臼本该顺利的继承王位，成为新天子统治诸夏，但他昏庸无能的父亲周幽王却听信谗言立伯服为太子，宜臼为了躲避迫害逃亡到申国，寻求自己外公申侯的庇护。公元前771年，在申侯的拥护下，联合犬戎攻破镐京，杀幽王于骊山下，随即宜臼被诸侯拥立即位。但联合犬戎无异于引狼入室，犬戎的肆虐让曾经王室的心脏地带化为灰烬，无力自保的宜臼只得在诸侯的护送下逃亡东方，而留在畿内的余臣则在虢公翰的拥立下自称为天子。\n\n#bold 曾经的家园已化为土灰，新的僭越者却在这废墟上公然挑战你的权威，你能否再次带领王室中兴，亦或是最终难逃周王朝覆灭的命运？#!"

  wang_subheading: "周携王"
  wang_desc: "姬余臣（望）是昏庸的周幽王的弟弟，在镐京沦陷，宜臼东迁时被虢公翰在携地拥立为新天子，公开与宜臼对抗。\n\n#bold 被畿内诸侯推举拥立为王的姬望留在宗周故地的余臣坚守在废墟之上，艰难地对抗着戎狄和东方的天子，你能否重振王室权威，重新统一天下，还是最终沦为王室内斗的政治牺牲品？#!"
