l_simp_chinese:
 dm_reform_story:0 "变法"
 dm_reform_story_desc:0 "一场围绕领地法律、朝堂派系与人物抉择展开的长期改革。"
 dm_reform_story_summary:0 "改革目标：#high [Story.MakeScope.Var('dm_reform_target').GetFlagName]#!\n改革主轴：[Story.MakeScope.Var('dm_reform_axis').GetFlagName]\n\n这是一场以人物、派系与朝堂争论为核心的领地法律改革。进度达到一百即告成功；支持度跌至负十则立即遭遇极端失败。"
 dm_reform_ruler_label:0 "君主"
 dm_reform_reformer_label:0 "改革者"
 dm_reform_no_reformer:0 "暂无改革者"
 dm_reform_actor_office_ruler:0 "君主"
 dm_reform_actor_office_reformer:0 "改革者"
 dm_reform_actor_office_councillor:0 "[dm_reform_actor.GetCouncilTitle]"
 dm_reform_actor_office_court_position:0 "宫廷职位持有者"
 dm_reform_actor_office_powerful_vassal:0 "强力封臣"
 dm_reform_actor_office_movement_leader:0 "运动领袖"
 dm_reform_actor_office_vassal:0 "封臣"
 dm_reform_actor_office_courtier:0 "朝臣"
 dm_reform.event.ruler_response:0 "由君主亲自处置"
 dm_reform.event.reformer_response:0 "交由改革者处置"
 dm_reform.event.trait_response:0 "凭借合适的性格与经验破局"
 dm_reform.event.resource_response:0 "投入额外资源确保执行"
 dm_reform.event.full_chance_tt:0 "本选项使用对应主持者的有效属性。检验结果可能为灾难、失败、成功或大成功；事件将显示并执行当前概率档的准确整数效果。"
 dm_reform.event.trait_chance_tt:0 "要求君主或改革者具备本事件匹配特质，有效属性检验获得#P +5#!。"
 dm_reform.event.resource_chance_tt:0 "由作出本次决定的主持者支付所示资源，有效属性检验获得#P +10#!；AI仅在支付后仍保留同额资源时选择。"
 dm_reform_counter_message_title:0 "变法局势变化"
 dm_reform_counter_message_desc:0 "变法进度：[dm_reform_story.MakeScope.Var('dm_reform_old_progress_display').GetValue|0] → [dm_reform_story.MakeScope.Var('dm_reform_new_progress_display').GetValue|0]（[dm_reform_story.MakeScope.Var('dm_reform_progress_display_delta').GetValue|+=0]）\n变法支持度：[dm_reform_story.MakeScope.Var('dm_reform_old_support_display').GetValue|0] → [dm_reform_story.MakeScope.Var('dm_reform_new_support_display').GetValue|0]（[dm_reform_story.MakeScope.Var('dm_reform_support_display_delta').GetValue|+=0]）"
 dm_reform_supporters_label:0 "支持者"
 dm_reform_opponents_label:0 "反对者"
 dm_reform_primary_title_label:0 "变法所系国本"
 dm_reform_progress_label:0 "变法进度"
 dm_reform_progress_min:0 "草创"
 dm_reform_progress_max:0 "新法告成"
 dm_reform_support_label:0 "变法支持度"
 dm_reform_support_min:0 "群情激愤"
 dm_reform_support_max:0 "上下同心"
 dm_reform_start_interaction_desc:0 "开始推动所选法律实施。变法成功后将实行所选法律"
 dm_reform_abort_decision:0 "结束变法"
 dm_reform_abort_decision_desc:0 "承认这场变法已难以为继，在付出威望与正统性的代价后结束个人故事。"
 dm_reform_abort_decision_tooltip:0 "触发“功亏一篑”，新法不会实施。"
 dm_reform_abort_decision_confirm:0 "功亏一篑"
 dm_reform_success_modifier:0 "新法既定"
 dm_reform_success_modifier_desc:0 "新法已经在领地内稳固施行。"
 dm_reform_failure_modifier:0 "变法受挫"
 dm_reform_failure_modifier_desc:0 "朝野仍在议论这场失败的改革。"
 dm_reform_extreme_failure_modifier:0 "变法崩溃"
 dm_reform_extreme_failure_modifier_desc:0 "改革激起了全面的政治反弹。"
 dm_reform_aborted_modifier:0 "功亏一篑"
 dm_reform_aborted_modifier_desc:0 "统治者主动停止了尚未完成的变法。"
 dm_reform.0001.t:0 "变革"
 dm_reform.0001.desc:0 "我的领地浸泡在老旧的制度中太久了，我不知道是否在我看不见的地方渐生锈蚀，是否腐败已经蔓延全身？对时代的恐惧告诉我：时间不打算给我机会去想明白这些问题。我的决心已定，改革制度势在必行！"
 dm_reform.0001.a:0 "先把章程铺开。"
 dm_reform.0002.t:0 "群臣表态"
 dm_reform.0002.desc:0 "筹备期已经结束。我的封臣们已经受到了通知，不知他们支持与否，真正的变法自今日开始。"
 dm_reform.0002.a:0 "让他们用事实表明立场。"
 dm_reform.event.measured_response:0 "我该尝试解决...."
 dm_reform.event.costly_response:0 "不惜代价，务求突破"
 dm_reform.event.chance_tt:0 "结果由君主与改革者对应能力、相关特质和事件难度共同决定。"
 dm_reform.chain_followup.t:0 "余波未平"
 dm_reform.chain_followup.desc:0 "我的改革者[dm_reform_actor.GetShortUIName]（[dm_reform_actor.Custom('DMReformActorOffice')]）仍在处理上一次的余波，朝堂和地方都在等待最终结果。"
 dm_reform.chain_followup.a:0 "继续观察。"
 dm_reform.9001.t:0 "新法告成"
 dm_reform.9001.desc:0 "成功了。历经无数个日夜的反复争论、阻挠与妥协，我终于摘得桂冠。现在新法在我的领地上铺开，传播着我的意志。"
 dm_reform.9001.a:0 "我的新政开始了。"
 dm_reform.9002.t:0 "变法失败"
 dm_reform.9002.desc:0 "岁月与政治耐心都已耗尽，新法没能落地。已经支付的代价不会归还，朝野也将记住这次失败。"
 dm_reform.9002.a:0 "收拾残局。"
 dm_reform.9003.t:0 "功亏一篑"
 dm_reform.9003.desc:0 "继续推进只会付出更大的代价。你亲手终止了这场变法，也必须承受半途而废的声望损失。"
 dm_reform.9003.a:0 "到此为止。"
 dm_reform.9004.t:0 "时移势易"
 dm_reform.9004.desc:0 "国本已经转移，或目标法律不再适用于当前政体与领地。变法中性结束：实际支付的金钱、威望和虔诚返还一半，影响力与正统性不予返还。"
 dm_reform.9004.a:0 "此事已无从继续。"
 dm_reform.9101.t:0 "众怒如火"
 dm_reform.9101.desc:0 "反对者要求你退位；若不答应，他们将把领地拖入更长久的动荡。"
 dm_reform.9101.a:0 "我将交出权位。"
 dm_reform.9102.t:0 "削弱君权"
 dm_reform.9102.desc:0 "反对者要求以成文承诺限制你的权力，作为停止对抗的代价。"
 dm_reform.9103.t:0 "公开让步"
 dm_reform.9103.desc:0 "群臣要求你撤回主张并向旧有利益作出实质让步。"
 dm_reform.9104.t:0 "下诏谢罪"
 dm_reform.9104.desc:0 "朝野要求你承认变法失当，以公开谢罪平息人心。"
 dm_reform.9105.t:0 "罢免改革者"
 dm_reform.9105.desc:0 "反对者把全部责任归于改革者，要求你立刻将其罢免。"
 dm_reform.9106.t:0 "逮捕改革者"
 dm_reform.9106.desc:0 "仅仅罢免已不能满足众人。他们要求把改革者投入牢狱。"
 dm_reform.9107.t:0 "流放改革者"
 dm_reform.9107.desc:0 "反对者要求改革者永远离开这个领地，以此证明新法已经彻底终结。"
 dm_reform.9108.t:0 "处死改革者"
 dm_reform.9108.desc:0 "最激烈的人群要求以改革者的性命为失败负责。"
 dm_reform.9109.t:0 "株连之议"
 dm_reform.9109.desc:0 "有人提出惩罚改革者的近亲，以彻底摧毁其政治根基。"
 dm_reform.9110.t:0 "联合举兵"
 dm_reform.9110.desc:0 "多名不满者正在互通消息；战争虽未在此刻写入诏令，却已成为迫近的现实。"
 dm_reform.9111.t:0 "百司停摆"
 dm_reform.9111.desc:0 "官吏以消极怠工回应失败的变法，领地行政陷入长期瘫痪。"
 dm_reform.9112.t:0 "派系汹涌"
 dm_reform.9112.desc:0 "所有不满都在失败后汇流，封臣对你与中央的敌意急剧上升。"
 dm_reform.extreme.resist:0 "绝不退让。"
 dm_reform.extreme.concede:0 "接受他们的条件。"
 dm_reform.extreme.apologize:0 "下诏谢罪。"
 dm_reform.extreme.dismiss:0 "罢免改革者。"
 dm_reform.extreme.protect:0 "我不会把责任推给改革者。"
 dm_reform.extreme.arrest:0 "将改革者软禁。"
 dm_reform.extreme.exile:0 "流放改革者。"
 dm_reform.extreme.execute:0 "处死改革者。"
 dm_reform.extreme.refuse:0 "拒绝株连。"
 dm_reform.extreme.endure:0 "只能承受后果。"
 dm_reform.9201.t:0 "功成求位"
 dm_reform.9201.desc:0 "改革者认为自己的功劳足以换取更高的地位。"
 dm_reform.9201.a:0 "先以荣誉相酬。"
 dm_reform.9201.b:0 "不可得寸进尺。"
 dm_reform.9202.t:0 "功成身退"
 dm_reform.9202.desc:0 "改革者表示愿意退居幕后，只求你承认其在新法中的贡献。"
 dm_reform.9202.a:0 "准其所请。"
 dm_reform.9203.t:0 "论功行赏"
 dm_reform.9203.desc:0 "改革者请求一笔与其功劳相称的赏赐。"
 dm_reform.9203.a:0 "赏赐理所应当。"
 dm_reform.9203.b:0 "国库另有用途。"
 dm_reform.9204.t:0 "不辞而别"
 dm_reform.9204.desc:0 "改革者突然离开宫廷。若条件允许，其将以现有角色身份成为冒险者；否则便进入人物池。"
 dm_reform.9204.a:0 "任其去吧。"
 dm_reform.9205.t:0 "相安无事"
 dm_reform.9205.desc:0 "改革者没有提出新的要求。变法之后的君臣关系暂时归于平静。"
 dm_reform.9205.a:0 "如此最好。"
 dm_reform_decisive_modifier:0 "雷厉风行"
 dm_reform_decisive_modifier_desc:0 "这位统治者以惊人的速度完成变法，朝野仍为其决断与执行力所震动。"
 dm_reform_theme_authority:0 "君权新章"
 dm_reform_theme_authority_desc:0 "新法重整了君臣权责，使统治者更善于运用威权。"
 dm_reform_theme_succession:0 "宗法既定"
 dm_reform_theme_succession_desc:0 "继承秩序已经厘定，宗族内部对新的名分渐趋认可。"
 dm_reform_theme_military:0 "军制更新"
 dm_reform_theme_military_desc:0 "军政制度经过整饬，统治者处理军事事务时更加得心应手。"
 dm_reform_theme_administration:0 "百司一体"
 dm_reform_theme_administration_desc:0 "行政体制获得统一，百司运转较以往更为顺畅。"
 dm_reform_theme_finance:0 "财计有序"
 dm_reform_theme_finance_desc:0 "新法理顺了财政收支，为领地带来更稳定的收入。"
 dm_reform_theme_ritual:0 "礼制重明"
 dm_reform_theme_ritual_desc:0 "礼制与正统得到重新申明，有助于积累虔诚声望。"
 dm_reform_theme_settlement:0 "国家定制"
 dm_reform_theme_settlement_desc:0 "定居与国家化制度得到巩固，领地发展因而受益。"
 dm_reform_power_curtailed:0 "权力受限"
 dm_reform_power_curtailed_desc:0 "变法失败后的政治妥协限制了统治者运用威权的空间。"
 dm_reform_civil_war_pressure:0 "内战阴云"
 dm_reform_civil_war_pressure_desc:0 "反对者已经公开联合，战争威胁使朝廷与军队都承受沉重压力。"
 dm_reform_administrative_paralysis:0 "行政瘫痪"
 dm_reform_administrative_paralysis_desc:0 "官僚体系以消极抵制回应变法，财政和地方治理陷入停滞。"
 dm_reform_faction_discontent:0 "派系不满"
 dm_reform_faction_discontent_desc:0 "变法争议加剧了封臣与派系的不满，他们更不愿服从统治者。"
 dm_reform_invite_reformer_interaction:0 "邀请担任改革者"
 dm_reform_invite_reformer_interaction_desc:0 "邀请该角色主持正在进行的变法。一般政体仅可邀请本宫廷廷臣；行政制与天朝制可邀请同一最高领地内的人物。"
 dm_reform_replace_reformer_interaction:0 "更换改革者"
 dm_reform_replace_reformer_interaction_desc:0 "主动更换仍在任的改革者：变法进度降低二十，并按君主等级支付威望；旧改革者会强烈不满，若其是强力封臣还可能转入反对者名单。"
 dm_reform_lobby_opponent_interaction:0 "拉拢变法反对者"
 dm_reform_lobby_opponent_interaction_desc:0 "由君主或改革者出面，尝试说服当前反对者转为支持。成功只改变名单，不直接提高支持度。"
 dm_reform_lobby_options_heading:0 "选择拉拢手段"
 dm_reform_lobby_money:0 "以金钱疏通"
 dm_reform_lobby_prestige:0 "以威望号召"
 dm_reform_lobby_influence:0 "以影响力运作"
 dm_reform_lobby_weak_hook:0 "动用弱牵制"
 dm_reform_lobby_strong_hook:0 "动用强牵制"
 dm_reform_start_button:0 "开始变法"
 dm_reform_start_button_tooltip:0 "支付所选法律的原费用并建立“变法”个人故事。法律不会立刻改变，只有变法成功才会实施。"
 dm_reform_law_window_title:0 "改革者与变法"
 dm_reform_law_window_desc:0 "强力封臣的即时赞同不再是通过法律的前置条件。开始后有三十日筹备期；你可通过“邀请担任改革者”人物互动延请一名合资格角色，或由君主亲自主持。"
 dm_reform_select_reformer_button:0 "选择改革者"
 dm_reform_select_reformer_button_tooltip:0 "从合资格的真实人物中预选改革者。变法建立后，该角色仍可接受或拒绝邀请。"
 dm_reform_self_host_button:0 "自行主持"
 centralization:0 "集权"
 succession_concentration:0 "继承集中"
 meritocracy:0 "任贤"
 military_control:0 "军事控制"
 administrative_unity:0 "行政统一"
 fiscal_extraction:0 "财政汲取"
 court_expenditure:0 "宫廷支出"
 ritual_legitimacy:0 "礼制正统"
 state_settlement:0 "定居国家化"
 dm_reform.0201.t:0 "主持者不复在"
 dm_reform.0201.desc:0 "改革者已经死亡、离境或无法继续履职。变法进度因此损失五点；你可以另行邀请一名真实存在的人物接任，也可以亲自主持。"
 dm_reform.0201.a:0 "另觅其人。"
 dm_reform.0202.t:0 "受命变法"
 dm_reform.0202.desc:0 "你接受了君主的邀请，成为这场变法的改革者。你的教育与能力将影响每次进度增长，也可能在事件中改变结果。"
 dm_reform.0202.a:0 "当尽我所能。"
 dm_reform.0203.t:0 "婉拒重任"
 dm_reform.0203.desc:0 "你拒绝担任改革者。君主仍可另选一人，或在没有改革者的情况下亲自主持。"
 dm_reform.0203.a:0 "此事非我所能。"
 dm_reform.0220.t:0 "新法之前"
 dm_reform.0220.desc:0 "[dm_reform_ruler.GetTitledFirstName]已经宣布推动一场变法。朝堂上的每个人都必须表明立场，而我的选择也将被记入这场变法的支持者或反对者名单。"
 dm_reform.0220.a:0 "我将支持这场变法。"
 dm_reform.0220.b:0 "我反对这场变法。"
 dm_reform.0231.t:0 "议程中断"
 dm_reform.0231.desc:0 "原本参与这段争议的人物已经死亡、离境或无法继续出席。此事就此中断，不会凭空找来另一个人物顶替。"
 dm_reform.0231.a:0 "只得暂且搁置。"
 dm_reform_select_reformer_interaction:0 "预选改革者"
 dm_reform_select_reformer_interaction_desc:0 "选择一名符合条件的真实人物，邀请其主持即将开始的变法。"
 recipient_secondary_dm_reform_select_reformer_interaction:0 "改革者"
 dm_reform_law_requirements_tt:0 "必须满足目标法律原有的全部适用与通过条件"
 dm_reform_reformer_still_eligible_tt:0 "改革者必须仍是符合本政体要求的可用人物"
 dm_reform_clear_pending_reformer_interaction:0 "由君主亲自主持"
 dm_reform.0210.t:0 "请君变法"
 dm_reform.0210.desc:0 "君主在正式开启变法前便选中了你，希望你作为改革者主持章程、辩论与推行。你可以接受，也可以拒绝。"
 dm_reform.0210.a:0 "我愿受命。"
 dm_reform.0210.b:0 "请另择贤能。"
 dm_reform.0301.t:0 "立场转变"
 dm_reform.0301.desc:0 "经过这次拉拢，你同意不再反对变法，并被记入支持者名单。这个转变不会直接改变当前支持度。"
 dm_reform.0301.a:0 "且看新法如何。"
 dm_reform.0302.t:0 "拉拢失败"
 dm_reform.0302.desc:0 "这次游说未能改变你的立场。三年内你将拒绝所有新的拉拢，五年内更不会再听同一名发起人陈说。"
 dm_reform.0302.a:0 "不必再说。"
