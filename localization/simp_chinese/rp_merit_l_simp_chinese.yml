 rp_merit.2010.t: "犒赏不均"
 rp_merit.2010.desc: "大帐之内,诸将皆受犒赏,酒肉盈案,金帛在前.唯独[rp_campaign_actor.GetTitledFirstName]立于帐外,手中无物,面沉如水.\n\n左右私语:“此人功勋不逊于帐内诸将,何以独遗之?”\n\n功簿所载:[rp_campaign_actor.MakeScope.Var('rp_merit_score').GetValue|0]."
 rp_merit.2010.a: "补赐金帛,当众抚慰"
 rp_merit.2010.b: "称主簿疏忽,事后再议"
 rp_merit.2010.c: "战时赏罚自有规矩"

 rp_merit.2011.t: "战车转向"
 rp_merit.2011.desc: "战鼓雷动,两军相接.[rp_campaign_actor.GetTitledFirstName]率部疾驰,起初人人皆呼其勇.可其旗号忽然斜刺里一转,不奔敌阵,反冲向己方侧翼.\n\n军中一片惊呼:先前犒赏之怨,竟在阵前爆发."
 rp_merit.2011.a: "传令军法官截停其部"
 rp_merit.2011.b: "亲率卫队上前弹压"
 rp_merit.2011.c: "全军收束,先稳住阵脚"

 rp_campaign_incident_grateful_opinion: "军前抚慰"
 rp_campaign_incident_rebuked_opinion: "军前受责"
 rp_campaign_incident_risk_opinion: "心有不平"
 rp_campaign_discipline_modifier: "军纪稍振"
 rp_campaign_discipline_modifier_desc: "军中赏罚虽严,号令因此更为明白."
 rp_campaign_disorder_modifier: "阵脚动摇"
 rp_campaign_disorder_modifier_desc: "军中有功者心生不满,诸部一时观望."
 rp_campaign_vanguard_modifier: "先头部队"
 rp_campaign_vanguard_modifier_desc: "此人获准率部追击,声势一时高涨."

 rp_merit.2020.t: "追与不追"
 rp_merit.2020.desc: "敌军败退,诸将皆言宜趁胜追击,毕其功于一役.唯有谨慎者提醒:穷寇勿追,恐有伏兵.\n\n[rp_campaign_actor.GetTitledFirstName]却按剑而笑:“战机稍纵即逝.君上若迟疑,臣自率本部追之!”\n\n功簿所载:[rp_campaign_actor.MakeScope.Var('rp_merit_score').GetValue|0]."
 rp_merit.2020.a: "准其追击,但不可深入"
 rp_merit.2020.b: "全军追击,不留余力"
 rp_merit.2020.c: "收兵回营,不追穷寇"

 rp_merit.2021.t: "山谷中伏"
 rp_merit.2021.desc: "追至山谷,两侧峭壁如削,前方道路忽断.箭矢如雨从天而降,滚木塞满谷口.\n\n[rp_campaign_actor.GetTitledFirstName]的旗帜已在谷中摇摇欲坠.先前的争功之言,此刻尽化为满营惊呼."
 rp_merit.2021.a: "亲率援军突入"
 rp_merit.2021.b: "坚守谷口,接应残兵"
 rp_merit.2021.c: "壮士断腕,全军撤退"

 rp_merit.2030.t: "夜入敌营"
 rp_merit.2030.desc: "深夜,巡营士卒来报:[rp_campaign_actor.GetTitledFirstName]不在帐中,佩剑与令旗皆失.\n\n三更时分,一骑自敌营方向驰归,正是此人.其低声道:“臣已与敌将夜谈,明日当有分晓.”\n\n若成,则是奇功;若败,便是通敌."
 rp_merit.2030.a: "此乃奇计,若能退敌当记首功"
 rp_merit.2030.b: "擅入敌营,拿下问罪"
 rp_merit.2030.c: "静待其变,明日再看"

 rp_merit.2040.t: "军前请缨"
 rp_merit.2040.desc: "军议之上,[rp_campaign_actor.GetTitledFirstName]挺身而出:“臣愿为先锋,取敌将首级献于帐前!”\n\n主帅以老成持重为由不许,此人面色顿变,帐中诸将也各自噤声."
 rp_merit.2040.a: "改任其为先锋"
 rp_merit.2040.b: "遣使安抚,许其后功"
 rp_merit.2040.c: "违抗军议,夺其兵权"

 rp_merit.2050.t: "免胄入阵"
 rp_merit.2050.desc: "战鼓方擂,[rp_campaign_actor.GetTitledFirstName]策马立于阵前,忽然摘下头盔掷于地上.\n\n左右皆惊:“将军,此非儿戏!”\n\n此人惨然一笑:“受君上厚恩而有失,唯以此身付沙场.”言毕便欲单骑冲阵."
 rp_merit.2050.a: "急令鸣金,召回此将"
 rp_merit.2050.b: "遣精锐随其冲阵"
 rp_merit.2050.c: "求仁得仁,由他去吧"

 rp_merit.2060.t: "易衣代君"
 rp_merit.2060.desc: "乱军之中,敌军直扑君上旗号.[rp_campaign_actor.GetTitledFirstName]大喝:“君上速退!”\n\n其扯下你的披风披于自身,策马向反方向驰去.敌军见旗色转移,尽数追之."
 rp_merit.2060.a: "趁此机会,全军突围"
 rp_merit.2060.b: "命全军回援,救出此将"
 rp_merit.2060.c: "此乃诈敌之计,速撤"

 rp_merit.2070.t: "饥军鼓噪"
 rp_merit.2070.desc: "军中粮饷渐窘,士卒以薄粥充饥.夜半,辎重营火光忽起,有人呼曰:“与其饿死,不如饱食而死!”\n\n喧哗声沿营垒传开,[rp_campaign_actor.GetTitledFirstName]入帐请命,只等你一句裁断."
 rp_merit.2070.a: "杀一儆百,先正军纪"
 rp_merit.2070.b: "开仓放粮,与士卒同甘"
 rp_merit.2070.c: "许以战后重赏,暂缓危局"

 rp_merit.2090.t: "夜缒出城"
 rp_merit.2090.desc: "城中被围日久,[rp_campaign_actor.GetTitledFirstName]请命夜缒而出,入敌营说其退兵.\n\n次日晨,敌营射来一箭,箭上绑书:“[rp_campaign_actor.GetTitledFirstName]已降,速开城门,免遭屠戮.”\n\n真伪未明,军心已动."
 rp_merit.2090.a: "此乃敌计,传令勿信"
 rp_merit.2090.b: "派人出城,打探虚实"
 rp_merit.2090.c: "既有降书,其家属皆治罪"

 rp_merit.2080.t: "军法如山"
 rp_merit.2080.desc: "操演之时,君上亲近之人嬉笑阵中,鼓声三通而阵型未成.[rp_campaign_actor.GetTitledFirstName]按剑上前,厉声道:\n\n“军法不立,何以临敌?今日若纵一人,明日便乱一军.”"
 rp_merit.2080.a: "准其执法"
 rp_merit.2080.b: "念其初犯,杖责免死"
 rp_merit.2080.c: "临阵换将,夺其兵权"

 rp_merit.2095.t: "三鼓之后"
 rp_merit.2095.desc: "敌军鼓声震天,诸将皆请出战.[rp_campaign_actor.GetTitledFirstName]却道:“未可.”\n\n敌军二鼓、三鼓之后,其气渐衰,此人才请击鼓.胜后诸将又欲追击,此人却下车视辙,再观旗号,方道:“可追矣.”"
 rp_merit.2095.a: "此乃良将,全权委以指挥"
 rp_merit.2095.b: "此乃怯战,按军法处置"
 rp_merit.2095.c: "姑且听之,但保留裁断"

 rp_campaign_life_saved_opinion: "代君脱险"
 rp_campaign_shamed_modifier: "军前受挫"
 rp_campaign_shamed_modifier_desc: "此人在军前受挫,锐气已折."
 rp_campaign_loyal_guard_modifier: "死忠护卫"
 rp_campaign_loyal_guard_modifier_desc: "此人曾在乱军中护主脱险,军中皆知其忠."
 rp_campaign_hunger_modifier: "饥军未平"
 rp_campaign_hunger_modifier_desc: "军中粮饷困窘,虽暂时压下,人心仍不安."
 rp_campaign_relief_modifier: "开仓劳军"
 rp_campaign_relief_modifier_desc: "君主亲自拨出粮饷,军中怨气稍解."
 rp_danshu_tiequan_modifier: "丹书铁券"
 rp_danshu_tiequan_modifier_desc: "此人受赐誓书,旧功可抵小过,其家门也因此更有底气."
 rp_merit_descendant_modifier: "功臣之后"
 rp_merit_descendant_modifier_desc: "此人出自旧功之家,常在君前露脸,宗族也因此多得照拂."
 rp_power_under_suspicion_modifier: "君前见疑"
 rp_power_under_suspicion_modifier_desc: "此人功名太盛,已被主君暗中猜忌."
 rp_power_stripped_modifier: "明升暗降"
 rp_power_stripped_modifier_desc: "此人名位似升,实则兵权被削,旧部亦多有不安."
 rp_power_retired_modifier: "功成身退"
 rp_power_retired_modifier_desc: "此人交还兵权,得以带着旧功安然退居朝外."
 rp_power_rebel_pressure_modifier: "旧部私议"
 rp_power_rebel_pressure_modifier_desc: "此人旧部私下串联,已使朝廷难以安心."
 rp_hereditary_office_modifier: "世官之许"
 rp_hereditary_office_modifier_desc: "此家因累世立功而获准更深地参与朝政."
 rp_banner_drums_privilege_modifier: "旗鼓之权"
 rp_banner_drums_privilege_modifier_desc: "此人获准在军中自领旗鼓,诸部对其号令更为信服."
 rp_fortification_privilege_modifier: "筑城之许"
 rp_fortification_privilege_modifier_desc: "此家获准修治城垒,以守采邑边境."
 rp_oath_tablets_modifier: "载书同盟"
 rp_oath_tablets_modifier_desc: "君臣之誓刻于简册,朝中旧臣因此更愿同心."
 rp_clan_grievance_modifier: "族党不平"
 rp_clan_grievance_modifier_desc: "此家族党认为旧功未被善待,暗中多有怨言."
 rp_privilege_granted_opinion: "特权获准"
 rp_privilege_refused_opinion: "特权被拒"
 rp_founding_memory_opinion: "追忆旧从"
 rp_founding_settled_dispute_opinion: "公断功争"
 rp_founding_unsettled_dispute_opinion: "旧功未平"

 rp_merit.3010.t: "献俘告庙"
 rp_merit.3010.desc: "[rp_founding_actor.GetTitledFirstName]请将近日所获俘虏与战功列入宗庙告祭之文.\n\n“功非臣一人之功,乃君上能用众也.然若不告于祖,士卒便不知何为荣辱.”"
 rp_merit.3010.a: "使其随从入庙,列名于简"
 rp_merit.3010.b: "军功归军府,不必惊动宗庙"
 rp_merit.3011.t: "输粟助军"
 rp_merit.3011.desc: "[rp_founding_actor.GetTitledFirstName]遣家宰入朝,车上载着粮帛与甲杖.\n\n“国有征役,宗族虽处采邑,不敢坐视.愿输粟助军,以报旧恩.”"
 rp_merit.3011.a: "收其粮帛,记入功簿"
 rp_merit.3011.b: "以义嘉之,不收其财"
 rp_merit.3012.t: "请入朝为卿"
 rp_merit.3012.desc: "[rp_founding_actor.GetTitledFirstName]已久掌一方,族中子弟亦渐入仕.今日其人入见,言辞谦逊而分量不轻.\n\n“臣家累从君上,愿得入朝议事,以免外臣不知国政.”"
 rp_merit.3012.a: "许其参议朝政"
 rp_merit.3012.b: "外臣守土即可"
 rp_merit.3013.t: "争邑讼功"
 rp_merit.3013.desc: "军府清点旧功时,[rp_founding_actor.GetTitledFirstName]对一处采邑的归属提出异议.\n\n“此邑本由臣部先登所得,今若旁落,臣之族党何以服?”"
 rp_merit.3013.a: "召吏按簿公断"
 rp_merit.3013.b: "争功乱法,先压下去"
 rp_merit.3014.t: "旧剑在席"
 rp_merit.3014.desc: "夜宴将散,[rp_founding_actor.GetTitledFirstName]忽从袖中取出一柄旧剑.剑鞘已斑驳,却仍能看出当年征战之痕.\n\n“君上可还记得,当年只凭此剑与数十人,便敢夺营?”"
 rp_merit.3014.a: "与其共饮,追忆旧难"
 rp_merit.3014.b: "旧事已远,不必多言"
 rp_merit.3015.t: "卿位之望"
 rp_merit.3015.desc: "[rp_founding_actor.GetTitledFirstName]的功绩已足以使朝中侧目.其门客在外放话:若功臣终不得位,后来者又何必效死?\n\n不久,此人入朝请见,只说愿“分君上忧”."
 rp_merit.3015.a: "给其名位,但扣其功簿"
 rp_merit.3015.b: "只记功,暂不许位"
 rp_merit.3016.t: "毁家纾难"
 rp_merit.3016.desc: "国用正窘,[rp_founding_actor.GetTitledFirstName]却主动献出私财.\n\n“臣家有余粟,国中有急用.若主忧臣安,此非从龙旧义.”"
 rp_merit.3016.a: "收下,并明记其义举"
 rp_merit.3016.b: "义心可嘉,财货仍归其家"
 rp_merit.3017.t: "请旗鼓"
 rp_merit.3017.desc: "[rp_founding_actor.GetTitledFirstName]请赐一面专属旗鼓,以便其部在战场上自成一阵.\n\n“军中号令须明.臣若得旗鼓,可使旧部不乱.”"
 rp_merit.3017.a: "赐其旗鼓之权"
 rp_merit.3017.b: "旗鼓不可私专"
 rp_merit.3018.t: "质子保赏"
 rp_merit.3018.desc: "[rp_founding_actor.GetTitledFirstName]提出愿遣宗子入朝宿卫.\n\n“宗子在君侧,则臣家无二心；君上念臣家,则旧功不至无凭.”"
 rp_merit.3018.a: "准其宗子宿卫"
 rp_merit.3018.b: "此举太重,暂且不许"
 rp_merit.3019.t: "族党请命"
 rp_merit.3019.desc: "[rp_founding_actor.GetTitledFirstName]先前因赏罚失当而心怀怨望,如今其族党联名请命.\n\n“旧臣有过,愿君上念其从征岁月,稍缓雷霆.”"
 rp_merit.3019.a: "既是旧臣,许其自新"
 rp_merit.3019.b: "法不因旧功而废"

 rp_merit.3050.t: "请丹书"
 rp_merit.3050.desc: "[rp_founding_actor.GetTitledFirstName]以旧功入见,请赐誓书.\n\n“臣不敢求无罪,但愿小过不掩大功.若他日谗言并起,愿君上以今日丹书为信.”"
 rp_merit.3050.a: "赐丹书铁券,以示不忘"
 rp_merit.3050.b: "功归功,罪归罪"
 rp_merit.3051.t: "铁券验信"
 rp_merit.3051.desc: "数年之后,[rp_founding_actor.GetTitledFirstName]的族人卷入争讼,朝中有人请严办.其家宰捧出当年丹书,伏地道:\n\n“君上旧誓在此,愿垂一线之恩.”"
 rp_merit.3051.a: "旧誓尚在,从轻发落"
 rp_merit.3051.b: "丹书不可乱法"
 rp_merit.3060.t: "世官之议"
 rp_merit.3060.desc: "[rp_founding_actor.GetTitledFirstName]的家门已非昔日寒微.族中子弟多习礼法兵书,今日正式请命:\n\n“愿君上许臣家世掌一职,使子弟知所学、宗族知所归.”"
 rp_merit.3060.a: "许其世官之望"
 rp_merit.3060.b: "官不可世守"
 rp_merit.3061.t: "子弟入朝"
 rp_merit.3061.desc: "当年许下世官之议后,[rp_founding_actor.GetTitledFirstName]族中子弟陆续入朝.有人称其家门知礼,也有人暗言朝堂渐成私门.\n\n此刻如何安置,将决定旧臣家门的走向."
 rp_merit.3061.a: "择其贤者,列于朝班"
 rp_merit.3061.b: "暂缓任用,免成尾大"
 rp_merit.3070.t: "边邑旧界"
 rp_merit.3070.desc: "[rp_founding_actor.GetTitledFirstName]的采邑与邻地发生边界争执.里老各执旧券,田夫互不相让.\n\n其人请你亲断:“一亩之争,若拖成族怨,来日便非小事.”"
 rp_merit.3070.a: "遣使量田,定界于众"
 rp_merit.3070.b: "小邑小争,令其自理"
 rp_merit.3071.t: "定界之后"
 rp_merit.3071.desc: "边邑定界之后,里人终于恢复耕作.不过新界既明,赋役也随之重算.\n\n[rp_founding_actor.GetTitledFirstName]上缴第一批新赋,同时暗示此事也应记入其家治理之功."
 rp_merit.3071.a: "收赋并记功"
 rp_merit.3071.b: "治理本分,不必再赏"
 rp_merit.3080.t: "载书同盟"
 rp_merit.3080.desc: "[rp_founding_actor.GetTitledFirstName]请与你重温旧盟,将君臣之誓刻于简册.\n\n“当年风雨中相从,非只为利.愿今日载书,使后人知我等何以同心.”"
 rp_merit.3080.a: "刻载书,重盟于庭"
 rp_merit.3080.b: "君臣名分已定,不必再盟"
 rp_merit.3081.t: "大难见誓"
 rp_merit.3081.desc: "时隔数年,朝中局势又起波澜.当年载书同盟的旧臣中,[rp_founding_actor.GetTitledFirstName]率先入朝表态:\n\n“盟书尚在,臣不敢后至.”"
 rp_merit.3081.a: "旧盟可嘉,厚记其功"
 rp_merit.3081.b: "言语忠顺,且看其行"
 rp_merit.3090.t: "藏功不言"
 rp_merit.3090.desc: "[rp_founding_actor.GetTitledFirstName]在近来战事中颇有贡献,却未列于请赏之列.问其缘故,此人只是低声道:\n\n“臣随君上久矣,不愿与后进争一日之名.”"
 rp_merit.3090.a: "先不张扬,记在心中"
 rp_merit.3090.b: "即刻公开记功"
 rp_merit.3091.t: "众论推功"
 rp_merit.3091.desc: "一年之后,军府重新清点旧簿,诸将竟一致推举[rp_founding_actor.GetTitledFirstName].\n\n“此人昔日藏功不言,今日若仍不录,恐寒旧臣之心.”"
 rp_merit.3091.a: "补录其功,使众人知义"
 rp_merit.3091.b: "以私谊慰之即可"

 rp_merit.3110.t: "后辈入侍"
 rp_merit.3110.desc: "[rp_founding_actor.GetTitledFirstName]的族中后辈[rp_founding_descendant.GetTitledFirstName]被荐入朝.旧臣言辞恳切:\n\n“臣老矣,愿使后生执戟阶前,知君恩亦知军法.”"
 rp_merit.3110.a: "使其入侍,观政习礼"
 rp_merit.3110.b: "旧臣之功,不必累及子弟"
 rp_merit.3111.t: "后辈请学"
 rp_merit.3111.desc: "[rp_founding_descendant.GetTitledFirstName]奉家命前来请学,愿随朝中老吏读律令、随军府习兵书.\n\n旧功之家若能有学,也许不止会索赏."
 rp_merit.3111.a: "拨入学舍,使其成材"
 rp_merit.3111.b: "功臣之后不可专占名额"
 rp_merit.3112.t: "后辈从军"
 rp_merit.3112.desc: "[rp_founding_descendant.GetTitledFirstName]请随军效力,言称不愿只凭祖辈旧功立身.\n\n帐中诸将窃语:若真能在军中磨砺,此家门便又多一代可用之人."
 rp_merit.3112.a: "给其小旗,从基层历练"
 rp_merit.3112.b: "少年气盛,先挫其锋"
 rp_merit.3113.t: "旧臣联姻"
 rp_merit.3113.desc: "[rp_founding_actor.GetTitledFirstName]试探着提出联姻之议,愿让[rp_founding_descendant.GetTitledFirstName]与朝中亲近之家结亲.\n\n这不是强求婚约,更像是在为旧功之家求一条长久立足之路."
 rp_merit.3113.a: "赐礼成媒,使其家门安定"
 rp_merit.3113.b: "婚姻自择,君上不必插手"
 rp_merit.3114.t: "后辈争名"
 rp_merit.3114.desc: "[rp_founding_descendant.GetTitledFirstName]在朝会上言语锋利,自称旧功之家不可久居人后.\n\n有人赞其有胆,也有人低声说:旧臣尚在,后辈已如此争名,来日恐更难制."
 rp_merit.3114.a: "有胆便给他一个露脸机会"
 rp_merit.3114.b: "少年争名,先压一压"

 rp_merit.4000.t: "功高震主"
 rp_merit.4000.desc: "[ROOT.Char.GetPrimaryTitle.GetNameNoTier]朝堂上,有关[rp_power_hero.GetTitledFirstName]的议论越发响亮.\n\n军中有人说:“无[rp_power_hero.GetFirstNameNoTooltip],何来今日疆土?”朝臣却低声提醒:功臣之功若高过君恩,旧部之心便未必只向宫阙.\n\n[rp_power_hero.GetTitledFirstName]功簿所载:[rp_power_hero.MakeScope.Var('rp_merit_score').GetValue|0],峰值:[rp_power_hero.MakeScope.Var('rp_merit_peak_score').GetValue|0]."
 rp_merit.4000.a: "厚加封赏,以安其心"
 rp_merit.4000.b: "削其兵权,明升暗降"
 rp_merit.4000.c: "姑且观之,不动声色"
 rp_merit.4201.t: "功臣结党"
 rp_merit.4201.desc: "密报送入案前:[rp_power_hero.GetTitledFirstName]府中宾客日盛,夜宴时常谈及朝政.\n\n有人称其只是旧部相聚,也有人说席间多有怨望之语.若放任不理,人心会向哪里聚拢,便难说了."
 rp_merit.4201.a: "遣人训诫,勿使其骄"
 rp_merit.4201.b: "派细作潜入其府"
 rp_merit.4201.c: "赐其美酒,以示恩宠"
 rp_merit.4202.t: "军民颂功"
 rp_merit.4202.desc: "[rp_power_hero.GetTitledFirstName]入城之日,士卒与百姓夹道相迎,呼声竟压过官鼓.\n\n“若[rp_power_hero.GetFirstNameNoTooltip]为君,我等早享富贵矣.”这句醉后狂言传入宫中,像一枚冷针落在席上."
 rp_merit.4202.a: "严查造谣之人"
 rp_merit.4202.b: "命其上交兵符"
 rp_merit.4202.c: "当众嘉奖,以塞众口"
 rp_merit.4203.t: "上表请赏"
 rp_merit.4203.desc: "[rp_power_hero.GetTitledFirstName]上表言辞恭谨,分量却不轻:\n\n“臣等征战多年,将士多有死伤.愿君上别赐恩典,使旧部知朝廷不忘战骨.”\n\n这不是普通请赏,而是在试探君臣之间还能容下多少旧功."
 rp_merit.4203.a: "赐金代地"
 rp_merit.4203.b: "许其世官,缓其封土之请"
 rp_merit.4203.c: "驳回所请"
 rp_merit.4300.t: "图穷匕见"
 rp_merit.4300.desc: "[rp_power_hero.GetTitledFirstName]称病不朝,只遣心腹入见:\n\n“臣闻功成身退,天之道也.然将士旧部皆仰臣鼻息.君上若不容臣,臣请归老林泉,唯愿带甲自卫,不负社稷.”\n\n名为请退,实为挟旧部自重.此刻再拖,便是把刀留在鞘中听它生锈."
 rp_merit.4300.a: "准其归老,赐金送出朝堂"
 rp_merit.4300.b: "召其入宫,当面议事"
 rp_merit.4300.c: "传旨赐死,以绝后患"
 rp_merit.4300.d: "联姻结亲,暂固其心"
 rp_merit.4401.t: "狡兔死"
 rp_merit.4401.desc: "[rp_power_hero.GetTitledFirstName]入宫之后,殿门骤闭.甲士自帘后而出,旧日功臣终于明白此行已无归路.\n\n临刑前,其人长叹:“狡兔死,走狗烹；飞鸟尽,良弓藏.”"
 rp_merit.4401.a: "国法已定,不必再言"
 rp_merit.4402.t: "绝食而终"
 rp_merit.4402.desc: "廷尉追问不休,言辞锋利如刀.[rp_power_hero.GetTitledFirstName]辩称平生所备不过丧葬之物,并无反心.\n\n数日之后,狱中传来消息:此人绝食呕血而亡.朝堂一时安静,却无人敢说此事真的结束了."
 rp_merit.4402.a: "令有司草草结案"
 rp_merit.4403.t: "功成身退"
 rp_merit.4403.desc: "[rp_power_hero.GetTitledFirstName]交还兵符,出城之日,你亲自相送.\n\n“卿为社稷功臣,当与国同休.”\n\n其人俯首再拜,旧部虽有不平,终究没有拔剑.这一次,君臣都从悬崖边退了一步."
 rp_merit.4403.a: "善终亦是大赏"
 rp_merit.4404.t: "旧部响应"
 rp_merit.4404.desc: "[rp_power_hero.GetTitledFirstName]没有束手就擒.消息传回军中,旧部立刻私下串联,有人直言:“清君侧者,正在今日!”\n\n其旗号尚未公然反叛,但你的使者已经很难安然出入其营帐."
 rp_merit.4404.a: "命诸将戒备,此事已成大患"

 rp_merit.2100.t: "旌旗微乱"
 rp_merit.2100.desc: "交锋之后,前军传来小乱:几面旌旗在烟尘中错列,左右部伍一时不辨进退.\n\n[rp_campaign_actor.GetTitledFirstName]上前请命:“旗鼓者,三军之耳目.愿即刻整列,勿使小误成大失.”"
 rp_merit.2100.a: "准其整旗,重明号令"
 rp_merit.2100.b: "小乱亦当问责"

 rp_merit.2101.t: "斥候疑尘"
 rp_merit.2101.desc: "斥候回报,远处尘土骤起,似有敌军别部绕行.[rp_campaign_actor.GetTitledFirstName]请暂缓追击,先辨虚实.\n\n诸将却多言:“敌已败矣,疑尘不足畏.”"
 rp_merit.2101.a: "谨慎为上,先探其虚实"
 rp_merit.2101.b: "乘胜疾进,不可失机"

 rp_merit.2102.t: "先登争赏"
 rp_merit.2102.desc: "战后清点首功,数名士卒争称先登,几乎拔剑相向.[rp_campaign_actor.GetTitledFirstName]入帐道:\n\n“小功不明,大赏必争.请君上早定其名.”"
 rp_merit.2102.a: "赐少许金帛,息其争"
 rp_merit.2102.b: "先记入功簿,战后再议"
 rp_merit.2102.c: "军中争功,先以法压下"

 rp_merit.2103.t: "收拢散卒"
 rp_merit.2103.desc: "败退之后,夜色沉沉.不少散卒沿沟壑归营,甲胄残破,神色惊惶.\n\n[rp_campaign_actor.GetTitledFirstName]亲自巡营,收拢伍列,使溃兵复归本旗."
 rp_merit.2103.a: "败中能收,亦当记功"
 rp_merit.2103.b: "败军之将,何功可言"

 rp_merit.2104.t: "鼓车失序"
 rp_merit.2104.desc: "退军途中,鼓车陷于泥中,金鼓一时不闻.后队不知前令,几乎自乱.\n\n[rp_campaign_actor.GetTitledFirstName]请立刻补鼓整队,否则诸部只会各自奔走."
 rp_merit.2104.a: "拨钱修鼓,重整节制"
 rp_merit.2104.b: "斩失鼓者,使众知惧"

 rp_merit.2105.t: "护住辎重"
 rp_merit.2105.desc: "败军回撤,辎重队几为敌骑所及.[rp_campaign_actor.GetTitledFirstName]率亲随断后,总算保住车乘粮械.\n\n虽非大胜,但军中人人知道:若无这些辎重,明日便难再战."
 rp_merit.2105.a: "败中护军,录其小功"
 rp_merit.2105.b: "赏其部曲,稳住人心"
 rp_merit.2105.c: "辎重归公,不得邀功"

