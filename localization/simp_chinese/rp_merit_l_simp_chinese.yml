l_simp_chinese:
 decision_group_type_rp_merit: "阅功簿决议"

 rp_merit_roster_decision: "阅功簿"
 rp_merit_roster_decision_desc: "查阅麾下臣属、骑士与曾立军功者的功勋记录,判断谁有功、谁待赏、谁已生怨."
 rp_merit_roster_decision_tooltip: "打开功勋排行."
 rp_merit_roster_decision_confirm: "展开功簿"
 rp_petition_liege_for_merit_decision: "向主君请赏"
 rp_petition_liege_for_merit_decision_desc: "你在主君军中已有功绩,可以呈上功簿,请求金帛、荣名或采邑."
 rp_petition_liege_for_merit_decision_tooltip: "凭你对主君的功绩请求赏赐."
 rp_petition_liege_for_merit_decision_confirm: "呈上功簿"

