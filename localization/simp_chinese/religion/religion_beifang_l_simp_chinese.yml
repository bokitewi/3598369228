 yili_adherent:1 "信徒"
 yili_adherent_plural:1 "信徒"
 yili_desc:0 ""东夷地区是中国传统的礼乐制度最早形成的地方。所谓夏代、商代、周代的用玉制度、用鼎制度都源自东夷。国之大事在祀与戎，可见，中国历史上的两大礼仪系统基本上都来自东方，并由此奠定了几千年的中国人的思想。"

