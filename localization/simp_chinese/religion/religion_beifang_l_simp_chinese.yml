 xirongfangling_desc:0 "戎是周时期中原人对西方诸部落的统称，西周以来不仅有许多姬姓与异姓诸侯，也有许多戎狄部落杂处其间，尽管戎和华夏在文明程度上有差距，但他们仍与诸夏往来频繁，深受商周及春秋时期诸夏的文化影响。"

