 guiwu:1 "鬼巫"
 guiwu_adj:0 "鬼巫"
 guiwu_adherent:1 "信徒"
 guiwu_adherent_plural:1 "信徒"
 guiwu_desc:0 "先秦时代四川巴蜀地区的宗教信仰。土伯，汉族神话中后土手下的侯伯，阴间幽都的看守。他虎头，牛身，长着三只眼睛，晃着一对利角，张开血污双手，驱逐着可怜的幽灵。其说始于先秦，达于近代。土伯是巴蜀氐羌部落第一代鬼帝。土伯的样子很可怕，手上拿着九条绳子，头上长着尖锐的角，隆背血手，飞快地追逐着人，三只眼，老虎头，身如牛，把人当美味。古巴蜀氐羌部落又称为鬼族的两支部落，在长期的交往中，因皆信鬼巫，产生了一个共同信仰的原始宗教神—土伯，被称为巴蜀两族的第一代鬼帝，这位鬼帝住在幽都。"

