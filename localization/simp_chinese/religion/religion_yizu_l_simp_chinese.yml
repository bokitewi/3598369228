 chuwu:1 "楚巫"
 chuwu_adj:0 "楚巫"
 chuwu_adherent:1 "信徒"
 chuwu_adherent_plural:1 "信徒"
 chuwu_desc:0 "楚人的信仰是多元的，包括天神、地祗和人鬼。”楚人对天的崇拜已非一般观念，而是有具体的对象的，如太一、东君、云中君等。敬天信鬼神必崇巫。巫，神通广大，能通天地、交鬼神、寄死生。楚国是从氏族制跨入文明社会门槛的，所以政治活动和科学文化知识，都蒙上了迷信的外衣，为“神事”所笼罩。关于楚国国名的来源，“清华简”公布前众说纷纭，莫衷一是。“清华简”公布后，据其中《楚居》一篇对楚先君鬻熊的记载，鬻熊的妻子妣厉生熊丽时难产，剖腹产后妣厉死去，熊丽存活。妣厉死后，巫师用“楚”（荆条）包裹其腹部埋葬。为了纪念她，后人就称自己的国家为“楚”。"

