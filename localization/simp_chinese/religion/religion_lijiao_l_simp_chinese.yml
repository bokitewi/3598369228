 dongzhouli_adherent_plural:0 "诸夏"
 dongzhouli_desc:0 "骊山之难后，以申侯、缯侯等为首诸侯们拥立废太子姬宜臼为周天子，华夏大地从此进入了礼崩乐坏、群雄逐鹿的局面，一大批心怀野心的诸侯已不甘于旧有礼制下的约束，而是奉行阴谋、战争以成就心中的野望。"

 dongzhouli_religious_head_title:0 "天子"
 dongzhouli_religious_head_title_name:0 "周"