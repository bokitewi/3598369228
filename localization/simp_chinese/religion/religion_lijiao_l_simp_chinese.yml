 xizhouli_adj:0 "西周礼"
 xizhouli_adherent:0 "诸夏"
 xizhouli_adherent_plural:0 "诸夏"
 xizhouli_desc:0 "周朝伊始，为配合政治上维护宗周统治的分封制，周公旦在意识形态领域进行了全面革新，将上古至殷商的礼乐进行大规模的整理、改造，创建了一整套具体可操作的礼乐制度，包括饮食、起居、祭祀、丧葬……社会生活的方方面面，都纳入“礼”的范畴。"

