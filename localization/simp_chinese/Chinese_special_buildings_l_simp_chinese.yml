 building_type_xibeiyanchi_salt_mines_01: "盐池"
 building_type_xibeiyanchi_salt_mines_01_desc: "盐池广泛分布于宗舟西北地区，被称为戎盐。"
 building_type_bashu_salt_mines_01: "巴蜀盐井"
 building_type_bashu_salt_mines_01_desc: "巴蜀地区的盐井自从夏商时期就被当地开发利用，盐的主要形式为泉盐。"
 building_type_liaodong_salt_mines_01: "辽东盐场"
 building_type_liaodong_salt_mines_01_desc: "辽东盐场因为岩岸割裂地形，只有面积狭小的盐场，海盐产量较少，但质量上乘。"
 building_type_jiaodong_salt_mines_01: "胶东盐场"
 building_type_jiaodong_salt_mines_01_desc: "胶东盐场主要分布在岩石海湾，面积狭小，产量较少，但好过没有。"
 building_type_lubei_salt_mines_01: "鲁北盐区"
 building_type_lubei_salt_mines_01_desc: "莱州湾一带分布有广泛的卤水层，含盐量比海水高四五倍。自商代起，此地的盐业便开始发展起来。"
 building_type_wuyue_salt_mines_01: "吴越海盐区"
 building_type_wuyue_salt_mines_01_desc: "吴越海盐区大量产出海盐，自古以来就“东有海盐之饶”。"

 building_type_Jixiaxuegong_01: "稷下学宫"
 building_type_Jixiaxuegong_01_desc: "稷下学宫集学术、政治、教育为一体,以“举贤而上功”为目的广泛地吸纳了各方学士。这里汇聚了诸多学派， 并定期举行学术聚会，其中所贯彻的学术思想将极大地促进普遍的思想进步。"
 building_type_zhanghuagong_01: "章华台"
 building_type_zhanghuagong_01_desc: "鱼鳞屋兮龙堂，紫贝阙兮朱宫。"
 building_type_zhugong_01: "渚宫"
 building_type_zhugong_01_desc: "渚宫坐落在郢都东南方向，既可监控汉水与长江航运，又能作为巡视南方的驻跸之所，同时兼具政治与军事功能。"
 building_type_gusugong_01: "姑苏台"
 building_type_gusugong_01_desc: "姑苏台高三百丈，宽八十四丈，有九曲路拾级而上，登上巍巍高台可饱览方圆二百里范围内湖光山色和田园风光，其景冠绝江南，闻名于天下。高台四周还栽上四季之花，八节之果，横亘五里，还建了灵馆、挖天池、开河、造龙舟、围猎物，供君王逍遥享乐。"
 building_type_zhouwanggong_01: "周王宫"
 building_type_zhouwanggong_01_desc: "巍峨高大的殿宇与迂回的长廊相映衬，展现出周天子的威严。"

 building_type_hulaoguan_01: "虎牢关"
 building_type_hulaoguan_01_desc: "又称汜水关，位于河南省荥阳市汜水镇，始建于秦朝，因传闻周穆王曾将进献的猛虎圈养于此而名虎牢，唐朝时避高祖的祖父李虎的忌讳亦称武牢关，南连嵩岳，北濒黄河，地处东西咽喉，由岭夹峙，是洛阳东边门户，为历代兵家必争之地。"
############关中四关
 building_type_xiaoguan_01: "萧关"
 building_type_xiaoguan_01_desc: "萧关历史上不仅是军事要地，而且是丝绸之路的必经之地。它的南侧，三条道路直通宁夏、内蒙古及甘肃等地；经环江、马莲河、泾河直抵关中。顾祖禹称萧关为“据八郡之肩背，绾三镇之要膂”，自古乃兵家必争之地。"
 building_type_dasanguan_01: "大散关"
 building_type_dasanguan_01_desc: "大散关亦称散关，关中四关之一，为周朝散国之关隘，故名散关。 这里山势险峻，层峦叠嶂，大有“一夫当关，万夫莫开”之势。 因其扼南北交通咽喉，自古为“川陕咽喉”、兵家必争之地。"
 building_type_wuguan_01: "少习关"
 building_type_wuguan_01_desc: "武关历史悠久，远在春秋时即以建置，名曰“少习关”，战国时改为“武关”。武关位于丹凤县东武关河的北岸，与函谷关，萧关，大散关成为“秦之四塞”。位于今丹凤县城东约80里处的谷涧间，汉江支流丹水自西北向东南穿越秦岭东段山地，切开一条狭长的低谷地带，成为秦岭东段南北往来的一条通道。"
 building_type_tongguan_01: "潼关"
 building_type_tongguan_01_desc: "“潼关地处黄河渡口，位居晋、陕、豫三省要冲，扼长安至洛阳驿道的要冲，是进出三秦之锁钥，所以成为汉末以来东入中原和西出关中、西域的必经之地及官方要隘，素有“畿内首险”、“四镇咽喉”、“百二重关”之誉。古称桃林塞，系东汉末年所设。范围包括今潼关以东到河南灵宝县西境。地处关中东部，位于今陕西省潼关县境内，南障秦岭，北阻黄河，东连函谷，西拱华山，形势险要，为长安的东大门。《山海关志》载：“畿内之险，唯潼关与山海为首。”潼关建关后，最初以黄河由北向南冲击关山而取名“冲关”，后因关西有潼水更名为“潼关”。"
##################太行八径
 building_type_jingjinguan_01: "井径关"
 building_type_jingjinguan_01_desc: "井陉关，又称土门关，位于河北省井陉县太行山井陉口，因地形四面高平、中部凹陷如井得名。作为太行八陉第五陉，自古为晋冀咽喉要道，《吕氏春秋》将其列为天下九塞之一。关隘主体由绵河横穿断裂谷形成，石壁陡峭，扼守华北平原与山西高原交通要冲。"
 building_type_fengyue_01: "风月关"
 building_type_fengyue_01_desc: "风月关位于河北省邯郸市峰峰矿区滏阳河发源地，地处神麋山与南鼓山对峙的“滏口陉”处，属太行八陉第四陉，自古为军事要隘。"
 building_type_baijing_01: "白陉古道"
 building_type_baijing_01_desc: "白陉古道始修于殷商时期，战国时成为豫北与晋南间的交通要道，现存最完整路段为双底村至辉县薄壁段。古道路面由石灰岩鹅卵石铺筑，马蹄车辙清晰可辨，包含七十二拐和悬天古道两段。悬天古道沿宝泉峡谷悬崖而建，宽不足两米，上下临绝壁深渊。该陉在战争时期为军事关隘，和平年代则为晋豫贸易商路。"
 building_type_tianjing_01: "天井关"
 building_type_tianjing_01_desc: "天井关，亦曰雄定关。为晋豫边境雄关，雄踞于山西晋城市境内，太行山的最南部，是通往河南焦作的关隘，史称太行八陉之一，因关前有三眼深不可测的天井泉而得名。"
#################洛阳八关
 building_type_hanguguan_01: "函谷关"
 building_type_hanguguan_01_desc: "函谷关西据高原，东临绝涧，南接秦岭，北塞黄河，是我国建置最早的雄关要塞。始建于西周，是东去洛阳，西达长安的咽喉，素有“天开函谷壮关中，万谷惊尘向北空”、“双峰高耸大河旁，自古函谷一战场”之说，自古为兵家必争之地。"
 building_type_yijue_01: "伊阙关"
 building_type_yijue_01_desc: "伊阙关即洛阳南龙门山和香山的阙口，两山夹峙，伊河穿流其中。东周时，为京都南面的重要关隘，是洛阳南下，荆襄北上的必经之道。今日伊阙关遗址处，建有宏伟古朴拱桥，连两山为一体。"
 building_type_guancheng_01: "广成关"
 building_type_guangcheng_01_desc: "广成关位于汉光武帝所置广成苑的南边，故名。遗址在今河南省平顶山市临汝镇一带，这里世称“两山夹一川”，其东北有长虫山、娘娘山、和尚山、白云山、盘龙山，西南有大马山、大虎岭，自古是通往汝颖的要塞。东汉时，在广成关附近，有广成泽，周围四百里，水出狼皋山中，东南流入汝水。隋大业初曾置马牧于此。由汝颖一带北上京洛，这里是必经之地。"
 building_type_dagu_01: "大谷关"
 building_type_dagu_01_desc: "大谷关遗址在今偃师寇店乡水泉村，是嵩山与龙门山间的峪谷。《洛阳记》说：“大谷，洛城南五十里，旧名通谷”。战时这里可埋伏重兵，断绝南北交通，为历代兵争将夺的古战场。"
 building_type_xuanyuan_01: "轘辕关"
 building_type_xuanyuan_01_desc: "遗址在今偃师与登封交界处，为洛阳通往许、陈的捷径要冲。关处鄂岭坂，在太室山和少室山之间，道路险隘，有弯道十二，回环盘旋，将去复还，故称轘辕关。其南边的鄂岭口，又有一关，为宋时偃师县知县马仲甫庸工所凿，道路轩敞，人便其利，当地人称鄂岭口，也叫新轘辕关。"
 building_type_xuanmen_01: "旋门关"
 building_type_xuanmen_01_desc: "旋门关遗址在今河南郑州市荥阳汜水西南一带。东汉以成皋旋门关为京师雒阳东面的第一关。班昭《东征赋》中云：“望河洛之交流，看成皋之旋门”，即指此关。洛阳向东过此，即无扼塞可以据守。"
 building_type_mengjin_01: "孟津关"
 building_type_mengjin_01_desc: "孟津关亦称河阳关，孟津关是洛阳北边的重要门户，位于黄河孟津段的孟津渡，孟津关最早应在今孟津县会盟镇的扣马村。此即周武王伐纣时与诸侯会盟渡河处，亦称盟津，又名富平津。西晋丰乐亭侯杜预曾在这里架起黄河上第一座浮桥，称“河桥”。北魏又置河阳三城于南北两岸及河中沙洲上，历代为洛阳北面之要津，是兵家必争之地。"
 building_type_xiaopingjin_01: "小平津关"
 building_type_xiaopingjin_01_desc: "小平津关位于今孟津县会盟镇花园村一带，黄河河心，也是黄河上的一道津渡，其地位仅次于富平津(孟津关)，故名小平津。 此外，洛阳西还有潼关，东有虎牢关，北有天井关(今山西晋城县南太行山顶)和轵关(河南济源县西)等。这些关隘同为洛阳门户，设防守卫，使洛阳成为进可攻，退可守的军事要地。"
####################蜀地与汉中
 building_type_jianmenguan_01: "剑阁道"
 building_type_jianmenguan_01_desc: "位于四川省广元市剑阁县剑门关镇，古称梁山，即大剑山，因两山相峙如门，故称剑门，享有“剑门天下险”之誉。始建于三国时期，与诸葛亮任蜀汉丞相在此垒石有关，称剑阁，又称剑阁关。"
 building_type_yangping_01: "阳平关"
 building_type_yangping_01_desc: "阳平关建于221年。据1931年商务印书馆出版的《中国古今地名大辞典》第957页载：“阳平关在四川中江西北三十里，蜀汉后皆为重镇，明末毁于兵。”宋初《元丰九域志》载：“阳平镇属玄武六镇之一。”清代《中江县志》记载：“阳平镇，建于汉代。为古五城、玄武北境门户，去绵州、罗江必经之地。”阳平关在历史上既是军事关隘，又是税务关卡。"
 building_type_xiameng_01: "葭萌关"
 building_type_xiameng_01_desc: "葭萌关一带古往今来发生过很多重大战役，最早是周慎靓王五年（公元前316年）的秦蜀之战，魏蜀时期“张飞挑灯夜战马超”之战，使葭萌关名闻遐迩。"
#########################################山西三关
 building_type_yanmenguan_01: "雁门关"
 building_type_yanmenguan_01_desc: "天下九塞，雁门为首"
 building_type_loufan_01: "娄烦关"
 building_type_loufan_01_desc: "战国时，赵武灵王曾在此置楼烦关，以防匈奴。"
 building_type_piantou_01: "偏头关"
 building_type_piantou_01_desc: "始建于明朝，地处三关西路，东连丫角山，西濒天堑黄河，因东仰西伏，故名偏头关。"
####################河北三关
 building_type_juyongguan_01: "居庸关"
 building_type_juyongguan_01_desc: "在地形上，居庸关地处温榆河上游河道——关沟中段，东依燕山山脉军都山，西接太行山，两侧高山对峙，地形险要，易守难攻，为历代军事必争之地。"
 building_type_zijin_01: "紫荆关"
 building_type_zijin_01_desc: "位于河北省易县，始建于战国，因山多紫荆树而得名，依坡傍水、两山相夹，是内长城的重要隘口之一，因位于居庸关和倒马关之间，明代时合称它们“内三关”，是由河北平原进入太行山区的要口。"
 building_type_hongzhisai_01: "鸿之塞"
 building_type_hongzhisai_01_desc: "鸿之塞最初战国时置,汉代称常山关，北魏叫铁关，亦名鸿山关。明代以后通称倒马关,因山路险峻，战马到此经常要摔倒而得名。"
#########################义阳三关
 building_type_wushengguan_01: "直辕"
 building_type_wushengguan_01_desc: "武胜关春秋时被称为直辕，礼山，秦朝统一中国后，更名武阳关，南宋时期易名武胜关。武胜关位于鸡公山下，是历代兵家必争之地。武胜关居三关之中，有“关中之关”的美誉。古人留下：“雄关高抱楚峰稠，峡树溪泉气色幽，地展平坦分两界，天留铁锁壮中州”的诗句。三关之中，武胜关居中，地位尤为重要，所以又称关中之关。武胜关又名武阳关，为两山夹峙，关隘雄伟。"
 building_type_mineguan_01: "冥扼关"
 building_type_mineguan_01_desc: "平靖关，居三关之西。春秋时称为冥扼关，宋朝时称为行者坡，行者关。相传三国时关羽率兵破曹，经此遇阻，恨此隘口，后来称为“恨这关”。平靖关在《吕氏春秋·有始览》和《淮南子·坠形训》中都列为“天下九寨，冥扼其一也”。它南襟全楚，北屏中原，战略地位十分重要，古人称为“淮汉兵争要害”。"
 building_type_dasuisai_01: "大隧塞"
 building_type_dasuisai_01_desc: "九里关居三关之东，又称黄岘关、百雁管、冠岘关，春秋时称大隧塞，宋以后始称九里关，在信阳市罗山县西南，是因关隘幽深绵长而得名。九里关与武胜关、平靖关成犄角之势，在历史上也是战事频繁。"
##############玉门关与阳关
 building_type_yumen_01: "玉门关"
 building_type_yumen_01_desc: "位于甘肃省敦煌市，又叫“小方盘城”，故址在今甘肃敦煌西北小方盘城，东南离敦煌80公里。始建于汉武帝时期，因西域输入玉石时取道于此而得名，是连接中原与西域的咽喉要冲。"
 building_type_yangguan_01: "阳关"
 building_type_yangguan_01_desc: "位于甘肃省敦煌市西南70公里古董滩附近，始建于汉武帝时期，因坐落在玉门关之南而得名阳关（古人以山南水北为阳），连接中原与西域的咽喉要冲，与玉门关为姊妹关。是丝绸之路南道必经关隘，古代兵家必争之地。"
#################南方
 building_type_zhennan_01: "镇南关"
 building_type_zhennan_01_desc: "位于广西省凭祥市西南18公里处，始建于汉朝时期，原名镇南关，附近是崇山峻岭，关藏山谷深处，为西南边防的重镇，是连接中国与越南的咽喉要冲。此关控大青、金鸡两山隘口，山峦重叠，谷深林茂，战略地位十分重要，为古代中国通往越南的重要交通要道，素有“南疆要塞”之称。"



 building_type_yaoguan_01: "峣关"
 building_type_yaoguan_01_desc: "峣关，故址在今陕西西安蓝田城南，因临峣山而得名。蓝田城多柳，又名峣柳关。峣关前距峣岭，后枕蒉山。地形险要，自古为关中平原通往荆州和南阳盆地的交通要隘，是武关以西靠近咸阳和长安的最后一关，战略地位非常重要。它的得失直接关系着国都长安的重要安危，峣关历来都是兵家必争之地"


 building_type_dujiangyan_01: "都江堰"
 building_type_dujiangyan_01_desc: "都江堰水利工程充分利用当地西北高、东南低的地理条件，根据江河出山口处特殊的地形、水脉、水势，乘势利导，无坝引水，自流灌溉，使堤防、分水、泄洪、排沙、控流相互依存，共为体系，保证了防洪、灌溉、水运和社会用水综合效益的充分发挥。"

 building_type_lingqu_01: "灵渠"
 building_type_lingqu_01_desc: "灵渠沟通了湘江、漓江，打通了南北水上通道，起到了沟通中原与岭南的作用。"

 building_type_huangjintai_01: "黄金台"
 building_type_huangjintai_01_desc: "《战国策·燕策一》：“于是昭王为（郭）隗筑宫而师之，乐毅自魏往，邹衍自齐往，剧辛自赵往，士争凑燕。”此事参见器用部·珍宝“死骨千金”。《战国策》原文系“筑宫”，至孔融《论盛孝章书》始有“筑台”之说。指招贤之所。唐李白《南奔书怀》：“侍笔黄金台，传觞青玉案。”另参见器用部·珍宝“黄金筑台”、人物部·圣贤“黄金台上客”、政事部议政“尊隗”。"

