fallen_of_zhou_dynasty_struggle.1004.t: "礼崩乐坏"
fallen_of_zhou_dynasty_struggle.1004.desc: "公元前770年，周王朝走到了命运的分歧点，幽王身死引爆了周王朝的政治分裂，畿内畿外二王并立，周室天命衰微，诸侯并起。外有四夷盘踞，枕戈待旦，不断蚕食着诸夏的边界。旧权威的残骸滋养着无数的野心家，用于维系统治的礼乐如今已经崩溃，现在命运的缰绳已落到个人手中。"
fallen_of_zhou_dynasty_struggle.1004.a: "我将匡扶周礼"
fallen_of_zhou_dynasty_struggle.1004.b: "我当取而代之"
fallen_of_zhou_dynasty_struggle.1004.c: "静观其变，明哲保身"
fallen_of_zhou_dynasty_struggle.1004.d: "趁虚而入，入主中原"

