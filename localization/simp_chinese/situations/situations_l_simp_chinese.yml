 ########################################
 # 礼崩乐坏 - 最终结算决议
 ########################################

 # 决议1：宣告新天命
 declare_new_mandate_title: "宣告新天命"
 declare_new_mandate_desc: "战国纷争，生灵涂炭。今我控有华夏大半疆土，是时候结束这乱世，宣告新的天命所归了！"
 declare_new_mandate_confirm: "天命在我！"
 declare_new_mandate_toast_title: "新天命宣告"
 declare_new_mandate_toast_desc: "[ROOT.GetTitledFirstName]宣告了新的天命，华夏迎来了新的统治者！"

 # 决议2a：周虽旧邦，其命维新
 zhou_old_state_new_mandate_title: "周虽旧邦，其命维新"
 zhou_old_state_new_mandate_desc: "周室虽古，天命可新。在礼乐复兴的浪潮中，身为天子的我，将重新统一华夏，开创一个崭新的周王朝！"
 zhou_old_state_new_mandate_confirm: "周命维新，天下归心！"
 zhou_old_state_new_mandate_toast_title: "周王朝中兴"
 zhou_old_state_new_mandate_toast_desc: "天子[ROOT.GetTitledFirstName]以周礼复兴天下，华夏重归一统，周王朝的中兴时代到来了！"

 # 决议2b：命运歧点
 fate_divergence_title: "命运歧点"
 fate_divergence_desc: "礼乐复兴之际，我虽为周礼忠臣，却已实际掌控华夏大半疆土。天子的命运、周室的未来、华夏的走向……这一切都悬于我的一念之间。\n\n我该如何抉择？是将天下奉还天子，成就周公之德；还是顺应时势，架空天子，开创属于自己的时代？"
 fate_divergence_confirm: "裁定天下归属"
 fate_divergence_choose_path: "选择华夏的命运"

 # 选项1：大政奉还
 fate_divergence_option_restore: "大政奉还"
 fate_divergence_option_restore_flavor: "「周公吐哺，天下归心。」我将效仿周公，以摄政之身辅佐天子，使周室中兴、天下大治。"
 fate_divergence_restore_toast_title: "大政奉还"
 fate_divergence_restore_toast_desc: "[ROOT.GetTitledFirstName]将统一后的华夏正式奉还天子[CHARACTER.GetTitledFirstName]，以摄政之身辅佐王室，天下称颂其德！"

 # 选项2：架空天子
 fate_divergence_option_usurp: "架空天子"
 fate_divergence_option_usurp_flavor: "「天命无常，惟德是辅。」天子的时代已经过去，我将接过华夏的权柄，以荣誉之位安置旧天子，开创全新时代。"
 fate_divergence_usurp_toast_title: "天子更替"
 fate_divergence_usurp_toast_desc: "[ROOT.GetTitledFirstName]取代了[CHARACTER.GetTitledFirstName]成为华夏的新主宰，旧天子被尊为荣誉皇帝，天下格局从此改变！"

 # 决议3：新朝征服
 new_dynasty_conquest_title: "新朝征服"
 new_dynasty_conquest_desc: "华夏文明虽然古老，但其天命已尽。我来自四夷之地，却已掌控华夏腹心。是时候终结这腐朽的旧秩序，以征服者的姿态建立属于我的新王朝！"
 new_dynasty_conquest_confirm: "旧朝已去，新朝当立！"
 new_dynasty_conquest_toast_title: "新朝建立"
 new_dynasty_conquest_toast_desc: "[ROOT.GetTitledFirstName]以征服者之姿入主华夏，终结了周朝的统治，一个全新的王朝在征服中诞生！"

