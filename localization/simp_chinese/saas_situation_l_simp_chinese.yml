 huimeng_present_domain_desc: "讨论封土治理，改善控制、发展与税收。"
 huimeng_assert_rights: "申明权利"
 huimeng_assert_rights_desc: "在诸侯面前申明名分，获得正统性和威望。"
 huimeng_seek_advantage: "谋取利益"
 huimeng_seek_advantage_desc: "从会盟中取得金钱、影响力与个人计谋优势。"
 huimeng_disrupt_loyalty: "扰乱忠诚"
 huimeng_disrupt_loyalty_desc: "降低会盟隆重度并破坏支持者关系；选择此意图者没有入盟资格。"

 # 会盟事件
 huimeng_activity.0001.t: "诸侯毕至"
 huimeng_activity.0001.desc: "旌旗沿道路次第展开，来自诸国的宾客进入城邑。今日的每一道礼节，都会成为他们评判盟主威望的尺度。"
 huimeng_activity.0001.a: "依古礼迎接诸侯"
 huimeng_activity.0001.b: "增设宴享，不可失了体面"
 huimeng_activity.0010.t: "堂上议事"
 huimeng_activity.0010.desc: "席位既定，诸侯开始陈说利害。有人主张同心协力，也有人试探盟主与其他国家的底线。"
 huimeng_activity.0010.a: "以公议调和诸国"
 huimeng_activity.0010.b: "暗中分化反对者"
 huimeng_activity.0020.t: "载书告成"
 huimeng_activity.0020.desc: "盟辞写入载书，诸侯将以各自的名号见证这份秩序。众人的目光都落在主持者身上。"
 huimeng_activity.0020.a: "告于礼法，共守盟誓"
 huimeng_activity.0020.b: "以诸国共同利益为誓"
 huimeng_activity.0090.t: "会盟窘迫"
 huimeng_activity.0090.desc: "礼节失序，宾客离心，这场会盟未能形成足以约束诸侯的共同体。诸国只记住了主持者的窘迫。"
 huimeng_activity.0090.a: "此辱来日必雪"
