 activity_huimeng_special_type_bar_segment_tt_2: "#T 庄重（80–94）#!\n创建会盟，获得10年奖励。"
 activity_huimeng_special_type_bar_segment_tt_3: "#T 辉煌（95及以上）#!\n创建会盟，获得15年奖励。"

 # 会盟意图
 huimeng_display_authority: "彰显威仪"
 huimeng_display_authority_desc: "以声望、正统性与影响力证明主持者有资格号召诸侯。"
 huimeng_isolate_opponents: "孤立反对者"
 huimeng_isolate_opponents_desc: "以敌对计谋、隐秘度和计谋抗性压制反对者。"
 huimeng_unite_supporters: "团结支持者"
 huimeng_unite_supporters_desc: "改善外交、集团内部好感与后续入盟吸引力。"
 huimeng_witness_oath: "见证盟誓"
 huimeng_witness_oath_desc: "以虔诚和威望见证诸侯盟誓。"
 huimeng_offer_support: "献上支持"
 huimeng_offer_support_desc: "公开支持盟主，以换取维护费与骑士效率奖励。"
