 # 会盟活动与隆重度
 activity_huimeng: "会盟"
 activity_huimeng_name: "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U]会盟"
 activity_huimeng_desc: "召集外交范围内的礼教诸侯，共议秩序、盟约与共同利益。成功会盟会创建或扩张主持者领导的家族集团。"
 activity_huimeng_host_desc: "$BULLET_WITH_TAB$支持者家族加入主持者的家族集团\n$BULLET_WITH_TAB$按隆重度获得持续5至15年的奖励\n$BULLET_WITH_TAB$诋毁者不会获得入盟资格"
 activity_huimeng_guest_desc: "支持者可以加入盟主的家族集团；宾客依照所选意图获得不同奖励。"
 activity_huimeng_conclusion_desc: "诸侯会盟结束了"
 activity_huimeng_selection_tooltip: "$activity_huimeng_desc$\n\n预期结果：\n$activity_huimeng_host_desc$"
 activity_huimeng_destination_selection: "会盟必须在主持者领地中的一处有效城邑举行。"
 activity_huimeng_province_desc: "会盟将在[ROOT.Province.GetName]举行。"
 activity_huimeng_guest_help_text: "公爵级及以上礼教统治者可以赴会。态度友好、缔有盟约或选择支持意图者更可能成为支持者。"
 activity_huimeng_predicted_cost: "会盟需要支付基础筹备费用；活动中的抉择还可能产生额外花费。"
 activity_huimeng_host_an_a: "$host_activity_a$"
 huimeng_phase_preparations: "迎宾陈礼"
 huimeng_phase_deliberations: "诸侯议事"
 huimeng_phase_oath: "载书盟誓"
 activity_huimeng_special_type_title: "#UND 隆重度#!"
 activity_huimeng_special_type_desc: "#T 会盟隆重度#!\n会盟开始时拥有#V 30#!点隆重度。迎宾、议事、盟誓、支持者与诋毁者会在活动过程中持续改变隆重度。"
 huimeng_magnificence_embarrassing: "窘迫"
 huimeng_magnificence_modest: "朴素"
 huimeng_magnificence_grand: "庄重"
 huimeng_magnificence_splendid: "辉煌"
 HUIMENG_CURRENT_MAGNIFICENCE: "#high [SelectLocalization( LessThan_CFixedPoint( ActivityWindow.GetSpecialProgressValue, '(CFixedPoint)50' ), 'huimeng_magnificence_embarrassing', SelectLocalization( LessThan_CFixedPoint( ActivityWindow.GetSpecialProgressValue, '(CFixedPoint)80' ), 'huimeng_magnificence_modest', SelectLocalization( LessThan_CFixedPoint( ActivityWindow.GetSpecialProgressValue, '(CFixedPoint)95' ), 'huimeng_magnificence_grand', 'huimeng_magnificence_splendid' ) ) )]#!"
 HUIMENG_WINDOW_SPECIAL_PROGRESS_TOOLTIP: "#T 会盟隆重度#!：#V [ActivityWindow.GetSpecialProgressValue|0]#!\n当前档位：$HUIMENG_CURRENT_MAGNIFICENCE$\n\n$BULLET$#V 30#!：窘迫\n$BULLET$#V 50#!：朴素\n$BULLET$#V 80#!：庄重\n$BULLET$#V 95#!：辉煌"
 activity_huimeng_special_type_bar_segment_tt_0: "#T 窘迫（30–49）#!\n不会创建家族集团。"
