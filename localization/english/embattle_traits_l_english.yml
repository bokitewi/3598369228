#Commander Traits
trait_embattle_logistician: "Logistician"
trait_embattle_logistician_1: "Skilled Quartermaster"
trait_embattle_logistician_2: "Master of Supplies"
trait_embattle_logistician_3: "Logistics Master"
trait_embattle_logistician_desc: "If there is one thing a Logistician knows, it is how to make supplies last — as long as possible."
trait_embattle_logistician_character_desc: "If there is one thing [ROOT.GetCharacter.GetFirstNameNoTooltip] knows, it is how to make supplies last — as long as possible."
trait_track_embattle_logistician: "Supply Master"
trait_track_embattle_logistician_desc: "#help You can gain experience in this track by moving armies on the map.#!\n\nMastering supplies means mastering war; the army will not falter at the crucial moment."

trait_embattle_military_engineer: "Military Engineer"
trait_embattle_military_engineer_1: "Skilled Artificer"
trait_embattle_military_engineer_2: "Siege Master"
trait_embattle_military_engineer_3: "Breaker of Walls"
trait_embattle_military_engineer_desc: "With extensive knowledge of siege engines and defenses, a Military Engineer is never stopped by walls."
trait_embattle_military_engineer_character_desc: "With extensive knowledge of siege engines and defenses, [ROOT.GetCharacter.GetFirstNameNoTooltip] is never stopped by walls.\n\n#weak [embattle|E]: Lieutenant and [embattle_tactic|E]#!"
