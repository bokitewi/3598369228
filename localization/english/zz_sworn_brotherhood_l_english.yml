 sworn_brotherhood_loyalty_strengthened_tt:0 "Our bond of loyalty has been tested and emerged stronger than ever."
 sworn_brotherhood_ferocity_strengthened_tt:0 "Our fierce brotherhood has proven itself in the crucible of time."
 sworn_brotherhood_tested_tt:0 "Our brotherhood has stood the test of time and grown stronger for it."
 sworn_brotherhood_humble_refusal_tt:0 "We humbly acknowledge our bond needs no further ceremony or reward."

