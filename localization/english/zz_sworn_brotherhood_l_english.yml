 opinion_broken_oath_justice:0 "Betrayed Our Sacred Oath"
 opinion_expected_betrayal:0 "Expected Their Treachery"
 stress_broken_oath_tt:0 "The betrayal of a sworn brother shakes your very soul."
 stress_vengeful_rage_tt:0 "Righteous fury consumes you, but brings no peace."
 
