 saas_recruit_talent_decision: "Issue a Call for Worthies"
 saas_recruit_talent_decision_confirm: "Issue the Call"
 saas_recruit_talent_decision_desc: "As ritual order crumbles, talented people need not serve one master forever. Courtesy and generous support may draw neglected worthies from across the realm."
 saas_recruit_talent_decision_tooltip: "Compete for unemployed talent using realm rank, strength, prestige, court grandeur, and stipend policy"
 saas_recruit_talent_decision_effect: "Gain [GetModifier('saas_recruit_talent_edict_modifier').GetNameWithTooltip] for #V 5 years#!. This decision has a #V 10-year#! cooldown."

 saas_elite_guest_arrived_title: "A Renowned Talent Arrives"
 saas_elite_guest_arrived_desc: "The elite talent [saas_elite_guest.GetShortUIName] has arrived at your court as a guest."
 saas_elite_adventurer_spawned_title: "A Renowned Talent Takes to the Road"
 saas_elite_adventurer_spawned_desc: "The elite talent [saas_elite_guest.GetShortUIName] appeared in your realm before founding a camp and becoming an adventurer."

 saas_retainer.1100.t: "A Retainer Volunteers: Investment"
 saas_retainer.1100.desc: "[retainer.GetShortUIName] presents a commercial scheme and claims that a few months of careful management can double the capital entrusted to [retainer.GetHerHim]. If it fails, however, the loss will be mine."
 saas_retainer.1100.a: "Entrust [retainer.GetHerHim] with 10[gold_i]."
 saas_retainer.1100.b: "Invest 25[gold_i]."
 saas_retainer.1100.c: "Commit 50[gold_i] and do it properly!"
 saas_retainer.1100.d: "My treasury has other needs."
 saas_retainer.1101.t: "Retainer Assignment: Investment"
 saas_retainer.1101.desc.success: "[retainer.GetShortUIName] returns with orderly accounts and handsome proceeds. The venture has indeed doubled my investment."
 saas_retainer.1101.desc.failure: "[retainer.GetShortUIName] returns empty-handed. Markets and people did not behave as expected, and the investment is lost."
 saas_retainer.1101.desc.invalid: "Changed circumstances have ended the venture, taking both its accounts and capital with it."
 saas_retainer.1101.a: "This is precisely the talent I need."
 saas_retainer.1101.b: "An expensive lesson."
 saas_retainer.1101.c: "The matter is beyond recovery."

 saas_retainer.1200.t: "A Retainer Volunteers: Embassy"
 saas_retainer.1200.desc: "[retainer.GetShortUIName] asks to visit the court of [neighboring_ruler.GetShortUIName], believing that tact and well-chosen gifts can improve relations."
 saas_retainer.1200.a: "Provide 15[gold_i] for the embassy."
 saas_retainer.1200.b: "This is no time for an embassy."
 saas_retainer.1201.t: "Retainer Assignment: Embassy"
 saas_retainer.1201.desc.success: "[retainer.GetShortUIName] completes the mission splendidly. [neighboring_ruler.GetShortUIName] accepts the gifts and praises my sincerity."
 saas_retainer.1201.desc.failure: "[retainer.GetShortUIName] fails to persuade [neighboring_ruler.GetShortUIName], and the embassy achieves nothing."
 saas_retainer.1201.desc.invalid: "The political situation changed before the embassy could finish its mission."
 saas_retainer.1201.a: "Good. Let friendship grow between us."
 saas_retainer.1201.b: "At least no harm was done."
 saas_retainer.1201.c: "Circumstance defeated the mission."

 saas_retainer.1300.t: "A Retainer Volunteers: Defenses"
 saas_retainer.1300.desc: "After inspecting the capital, [retainer.GetShortUIName] reports neglected gates, armories, and levy rolls, and asks to direct a comprehensive reform."
 saas_retainer.1300.a: "Provide 15[gold_i] to reform the defenses."
 saas_retainer.1300.b: "The old arrangements will suffice."
 saas_retainer.1301.t: "Retainer Assignment: Defenses"
 saas_retainer.1301.desc.success: "[retainer.GetShortUIName] completes the reform. Gates are watched, stores are ordered, and the levy rolls have been corrected."
 saas_retainer.1301.desc.failure: "Obstruction defeats the reform. Despite great effort, [retainer.GetShortUIName] achieves little."
 saas_retainer.1301.desc.invalid: "A sudden change of circumstances has made the planned defense reform impossible."
 saas_retainer.1301.a: "A secure capital eases my mind."
 saas_retainer.1301.b: "Old abuses are not cured in a day."
 saas_retainer.1301.c: "Other matters now demand attention."

 saas_retainer.1400.t: "A Retainer Volunteers: Embezzlement"
 saas_retainer.1400.desc: "[retainer.GetShortUIName] has found suspicious gaps in the accounts and asks to investigate the suspected embezzlement in secret."
 saas_retainer.1400.a: "Provide 15[gold_i] for the investigation."
 saas_retainer.1400.b: "Do not turn the court against itself."
 saas_retainer.1401.t: "Retainer Assignment: Investigation"
 saas_retainer.1401.desc.success: "[retainer.GetShortUIName] follows accounts and testimony to the hidden money. The guilty have confessed, and others now fear my reach."
 saas_retainer.1401.desc.failure: "The trail goes cold. [retainer.GetShortUIName] recovers nothing and leaves several courtiers resentful of the inquiry."
 saas_retainer.1401.desc.invalid: "Changes in personnel and circumstance have forced the investigation to be shelved."
 saas_retainer.1401.a: "Recover the money and restore discipline."
 saas_retainer.1401.b: "Let the matter end here."
 saas_retainer.1401.c: "Seal the old records."

 saas_retainer.1500.t: "A Retainer Volunteers: Rites and Agriculture"
 saas_retainer.1500.desc: "[retainer.GetShortUIName] asks to collate scattered ritual canons, agricultural manuals, and local registers so officials may govern by a consistent standard."
 saas_retainer.1500.a: "Provide 15[gold_i] for the compilation."
 saas_retainer.1500.b: "We lack the resources for this."
 saas_retainer.1501.t: "Retainer Assignment: Compilation"
 saas_retainer.1501.desc.success: "[retainer.GetShortUIName] has compiled the scattered records into a clear new work. Officials govern from it, while the people better understand rites and seasons."
 saas_retainer.1501.desc.failure: "The records are too numerous and contradictory. [retainer.GetShortUIName] cannot produce a useful work in time."
 saas_retainer.1501.desc.invalid: "Changes in leadership or circumstance have interrupted the compilation."
 saas_retainer.1501.a: "This work will benefit generations."
 saas_retainer.1501.b: "Preserve the drafts for later."
 saas_retainer.1501.c: "Set the work aside."

 saas_retainer.1600.t: "A Retainer Requests a Raise"
 saas_retainer.1600.desc: "[retainer.GetShortUIName] argues that skill and service deserve better reward and asks for an additional half stipend for the next five years."
 saas_retainer.1600.a: "Talent should be supported generously."
 saas_retainer.1600.b: "The current stipend is sufficient."
